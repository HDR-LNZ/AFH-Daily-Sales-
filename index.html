}

// ─── Main Dashboard ──────────────────────────────────────────────────────────

function App() {
  // Load saved state from localStorage if available
  const savedState = (() => {
    try {
      const raw = localStorage.getItem("hh_dashboard_state");
      if (!raw) { console.log("No saved dashboard state found"); return null; }
      const s = JSON.parse(raw);
      if (!s || !s.ts) { console.log("Saved state invalid (no timestamp)"); return null; }
      if (Date.now() - s.ts > 7 * 24 * 3600 * 1000) { console.log("Saved state expired"); return null; }
      console.log("Restoring saved state from", new Date(s.ts).toLocaleString(), "- date:", s.reportDate, "specs:", s.specialties?.length, "docs:", s.doctors?.length);
      return s;
    } catch(e) { console.warn("Failed to load saved state:", e); return null; }
  })();

  // Initialize all state from saved or defaults
  const initSpecs = savedState?.specialties ? savedState.specialties.map(s => ({ ...s, mtdVarBudget: s.mtdBudget?(s.mtdActual-s.mtdBudget)/s.mtdBudget:0, mtdVarLY: s.mtdLY?(s.mtdActual-s.mtdLY)/s.mtdLY:0, ytdVarBudget: s.ytdBudget?(s.ytdActual-s.ytdBudget)/s.ytdBudget:0, ytdVarLY: s.ytdLY?(s.ytdActual-s.ytdLY)/s.ytdLY:0 })) : DEFAULT_SPECIALTIES;
  const initDocs = savedState?.doctors ? savedState.doctors.map(d => ({ ...d, mtdVarBudget: d.mtdBudget?(d.mtdActual-d.mtdBudget)/d.mtdBudget:0, ytdVarBudget: d.ytdBudget?(d.ytdActual-d.ytdBudget)/d.ytdBudget:0, mtdVarLY: d.mtdLY?(d.mtdActual-d.mtdLY)/d.mtdLY:0, ytdVarLY: d.ytdLY?(d.ytdActual-d.ytdLY)/d.ytdLY:0 })) : DEFAULT_DOCTORS;

  const [specialties, setSpecialties] = useState(initSpecs);
  const [doctors, setDoctors] = useState(initDocs);
  const [reportDate, setReportDate] = useState(savedState?.reportDate || DEFAULT_REPORT_DATE);
  const [locations, setLocations] = useState(savedState?.locations || DEFAULT_LOCATIONS);
  const [selectedClinic, setSelectedClinic] = useState(null);
  const [dsrTotals, setDsrTotals] = useState(savedState?.dsrTotals || DEFAULT_DSR_TOTALS);
  const [ipSpecialties, setIpSpecialties] = useState(savedState?.ipSpecialties || DEFAULT_IP_SPECIALTIES);
  const [ipDoctors, setIpDoctors] = useState(savedState?.ipDoctors || DEFAULT_IP_DOCTORS);
  const [dailyRevenue, setDailyRevenue] = useState(savedState?.dailyRevenue || DEFAULT_DAILY_REVENUE);
  const [selectedSpecialty, setSelectedSpecialty] = useState(null);
  const [expandedResigned, setExpandedResigned] = useState(null);
  const [doctorLocations, setDoctorLocations] = useState(savedState?.doctorLocations || DEFAULT_DOCTOR_LOCATIONS);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [activeSection, setActiveSection] = useState("overview");
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
  const [dataWarnings, setDataWarnings] = useState([]);
  const [historicalMonth, setHistoricalMonth] = useState(null);
  const currentStateRef = useRef(null); // stores the "current month" state for Back to Current

  function verifyHistoricalData(hist) {
    const warnings = [];
    const specTotal = hist.specialties ? hist.specialties.reduce((a,s) => a + s.mtdActual, 0) : 0;

    // Specialty total should be less than DSR total (OP only)
    if (specTotal > hist.dsr.mtdActual) {
      warnings.push("Specialty total (" + fmt(specTotal) + ") exceeds DSR total (" + fmt(hist.dsr.mtdActual) + ")");
    }

    // DSR/OP ratio should be 1.3-2.0x
    if (specTotal > 0) {
      const ratio = hist.dsr.mtdActual / specTotal;
      if (ratio < 1.1 || ratio > 2.5) {
        warnings.push("DSR/OP ratio " + ratio.toFixed(2) + "x outside expected 1.3-2.0x");
      }
    }

    return warnings;
  }

  const loadHistoricalMonth = useCallback((monthKey) => {
    // Save current state before switching (only if not already viewing history)
    if (!historicalMonth) {
      currentStateRef.current = { dsrTotals, locations, reportDate, specialties, doctors, ipSpecialties, ipDoctors, dailyRevenue, doctorLocations };
    }
    const hist = MONTHLY_HISTORY.find(m => m.monthKey === monthKey);
    if (!hist) return;
    setHistoricalMonth(monthKey);
    const d = hist.dsr;
    setDsrTotals({
      todayRev: d.todayRev, mtdActual: d.mtdActual, mtdLY: d.mtdLY || 0,
      ytdActual: d.ytdActual, ytdLY: d.ytdLY, ytdBudget: d.ytdBudget,
      opMtdVolume: d.opMtdVolume, opMtdLYVolume: 0,
      opMtdPPC: 0, opMtdLYPPC: 0, opMtdRevenue: 0, opMtdLYRevenue: 0,
      daysElapsed: d.daysElapsed,
      mtdBudget: d.mtdActual,
    });
    const histLocs = hist.clinics.map(c => ({
      location: c.loc,
      totalToday: 0,
      totalRevenueMTD: c.mtd,
      mtdBudget: 0,
      mtdLY: c.mtdLY,
      totalRevenueYTD: c.ytd,
      ytdBudget: 0,
      ytdLY: c.ytdLY,
      opVolMTD: c.vol,
      opVolMTDLY: c.volLY,
      ppcYTD: c.vol ? Math.round(c.ytd / c.vol) : 0,
      ppcYTDLY: c.volLY ? Math.round(c.ytdLY / c.volLY) : 0,
      specialties: [],
    }));
    setLocations(histLocs);
    setReportDate(hist.month);
    // Set daily revenue data
    if (hist.daily && hist.daily.length > 0) {
      setDailyRevenue(hist.daily);
    } else {
      setDailyRevenue([]);
    }

    // Set specialties from historical data
    if (hist.specialties && hist.specialties.length > 0) {
      setSpecialties(hist.specialties.map(s => ({
        ...s,
        mtdVarBudget: s.mtdBudget ? (s.mtdActual - s.mtdBudget) / s.mtdBudget : 0,
        mtdVarLY: s.mtdLY ? (s.mtdActual - s.mtdLY) / s.mtdLY : 0,
        ytdVarBudget: s.ytdBudget ? (s.ytdActual - s.ytdBudget) / s.ytdBudget : 0,
        ytdVarLY: s.ytdLY ? (s.ytdActual - s.ytdLY) / s.ytdLY : 0,
      })));
    }

    // Set IP data from historical
    if (hist.ipSpecs && hist.ipSpecs.length > 0) {
      setIpSpecialties(hist.ipSpecs);
    } else if (hist.ip) {
      setIpSpecialties([{
        name: "All IP", mtdActual: hist.ip.mtdActual, mtdLY: hist.ip.mtdLY, mtdBudget: hist.ip.mtdBudget,
        mtdVolume: hist.ip.volume, mtdVolLY: hist.ip.volumeLY,
        ytdActual: hist.ip.ytdActual || 0, ytdLY: hist.ip.ytdLY || 0,
      }]);
    }

    // Clear doctors for historical (no individual doctor data available)
    setDoctors([]);
    setIpDoctors([]);

    setDataWarnings(verifyHistoricalData(hist));
  }, []);

  const loadCurrentMonth = useCallback(() => {
    setHistoricalMonth(null);
    const s = currentStateRef.current;
    if (s) {
      setDsrTotals(s.dsrTotals);
      setLocations(s.locations);
      setReportDate(s.reportDate);
      setSpecialties(s.specialties);
      setDoctors(s.doctors);
      setIpSpecialties(s.ipSpecialties);
      setIpDoctors(s.ipDoctors);
      setDailyRevenue(s.dailyRevenue);
      if (s.doctorLocations) setDoctorLocations(s.doctorLocations);
    } else {
      // Try localStorage, then fall back to defaults
      let ls = null;
      try { const raw = JSON.parse(localStorage.getItem("hh_dashboard_state")); if (raw && raw.ts) ls = raw; } catch(e) {}
      setDsrTotals(ls?.dsrTotals || DEFAULT_DSR_TOTALS);
      setLocations(ls?.locations || DEFAULT_LOCATIONS);
      setReportDate(ls?.reportDate || DEFAULT_REPORT_DATE);
      setSpecialties(ls?.specialties ? ls.specialties.map(s => ({ ...s, mtdVarBudget:s.mtdBudget?(s.mtdActual-s.mtdBudget)/s.mtdBudget:0, mtdVarLY:s.mtdLY?(s.mtdActual-s.mtdLY)/s.mtdLY:0, ytdVarBudget:s.ytdBudget?(s.ytdActual-s.ytdBudget)/s.ytdBudget:0, ytdVarLY:s.ytdLY?(s.ytdActual-s.ytdLY)/s.ytdLY:0 })) : DEFAULT_SPECIALTIES);
      setDoctors(ls?.doctors ? ls.doctors.map(d => ({ ...d, mtdVarBudget:d.mtdBudget?(d.mtdActual-d.mtdBudget)/d.mtdBudget:0, ytdVarBudget:d.ytdBudget?(d.ytdActual-d.ytdBudget)/d.ytdBudget:0, mtdVarLY:d.mtdLY?(d.mtdActual-d.mtdLY)/d.mtdLY:0, ytdVarLY:d.ytdLY?(d.ytdActual-d.ytdLY)/d.ytdLY:0 })) : DEFAULT_DOCTORS);
      setIpSpecialties(ls?.ipSpecialties || DEFAULT_IP_SPECIALTIES);
      setIpDoctors(ls?.ipDoctors || DEFAULT_IP_DOCTORS);
      setDailyRevenue(ls?.dailyRevenue || DEFAULT_DAILY_REVENUE);
      if (ls?.doctorLocations) setDoctorLocations(ls.doctorLocations);
    }
    setDataWarnings([]);
  }, []);

  React.useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  const scrollToSection = useCallback((id) => {
    setActiveSection(id);
    const el = document.getElementById(id);
    if (el) {
      const offset = window.innerWidth < 768 ? 64 : 0;
      const top = el.getBoundingClientRect().top + window.pageYOffset - offset;
      window.scrollTo({ top, behavior: "smooth" });
    }
  }, []);

  const handleFileLoaded = useCallback(({ specialties: specs, doctors: docs, reportDate: rd, locations: locs, dsrTotals: dst, ipSpecialties: ipSpecs, ipDoctors: ipDocs, dailyRevenue: dr, doctorLocations: dlocs }) => {
    setSpecialties(specs.map((s) => ({ ...s,
      mtdVarBudget: s.mtdVarBudget || (s.mtdBudget ? (s.mtdActual-s.mtdBudget)/s.mtdBudget : 0),
      mtdVarLY: s.mtdVarLY || (s.mtdLY ? (s.mtdActual-s.mtdLY)/s.mtdLY : 0),
      ytdVarBudget: s.ytdBudget ? (s.ytdActual-s.ytdBudget)/s.ytdBudget : 0,
      ytdVarLY: s.ytdLY ? (s.ytdActual-s.ytdLY)/s.ytdLY : 0,
    })));
    if (docs?.length) setDoctors(docs);
    if (locs?.length) setLocations(locs);
    if (dst) setDsrTotals(dst);
    if (ipSpecs) setIpSpecialties(ipSpecs);
    if (ipDocs) setIpDoctors(ipDocs);
    if (dr && dr.length) setDailyRevenue(dr);
    if (dlocs && Object.keys(dlocs).length) setDoctorLocations(dlocs);
    setReportDate(rd);
    setHistoricalMonth(null);
    const warnings = validateData({ specialties: specs, doctors: docs, dsrTotals: dst, locations: locs, dailyRevenue: dr });
    setDataWarnings(warnings);
    if (warnings.length > 0) {
      console.warn("Data validation warnings:", warnings);
    }
    // Save complete state to localStorage so data persists across refreshes
    try {
      localStorage.setItem("hh_dashboard_state", JSON.stringify({
        reportDate: rd, dsrTotals: dst,
        specialties: specs.map(s => ({ name:s.name, today:s.today, mtdActual:s.mtdActual, mtdBudget:s.mtdBudget, mtdLY:s.mtdLY, ytdActual:s.ytdActual, ytdBudget:s.ytdBudget, ytdLY:s.ytdLY })),
        doctors: docs ? docs.map(d => ({ name:d.name, specialty:d.specialty, today:d.today, mtdActual:d.mtdActual, mtdBudget:d.mtdBudget, mtdLY:d.mtdLY, ytdActual:d.ytdActual, ytdBudget:d.ytdBudget, ytdLY:d.ytdLY, locations:d.locations||"" })) : null,
        locations: locs || null,
        ipSpecialties: ipSpecs || null,
        ipDoctors: ipDocs || null,
        dailyRevenue: dr || null,
        doctorLocations: dlocs || null,
        ts: Date.now(),
      }));
      console.log("Dashboard state saved to localStorage - date:", rd, "specs:", specs.length, "docs:", docs?.length, "size:", Math.round(localStorage.getItem("hh_dashboard_state").length/1024) + "KB");
    } catch(e) { console.warn("Failed to save state:", e); }
  }, []);

  const totals = useMemo(() => {
    const tr = dsrTotals.todayRev;
    const mA = dsrTotals.mtdActual;
    const mB = dsrTotals.mtdBudget;
    const mL = dsrTotals.mtdLY;
    const yA = dsrTotals.ytdActual;
    const yB = dsrTotals.ytdBudget;
    const yL = dsrTotals.ytdLY;
    return {
      todayRev: tr, mtdActual: mA, mtdBudget: mB, mtdLY: mL,
      mtdVarBudget: mB ? (mA - mB) / mB : 0,
      mtdVarLY: mL ? (mA - mL) / mL : 0,
      ytdActual: yA, ytdBudget: yB, ytdLY: yL,
      ytdVarBudget: yB ? (yA - yB) / yB : 0,
      ytdVarLY: yL ? (yA - yL) / yL : 0,
    };
  }, [dsrTotals]);

  const scaledDailyRevenue = useMemo(() => {
    if (!dailyRevenue.length) return [];
    const opMtd = specialties.reduce((a, s) => a + s.mtdActual, 0) || 1;
    const dsrMtd = dsrTotals.mtdActual || opMtd;
    const ratio = dsrMtd / opMtd;
    const scaled = dailyRevenue.map(d => ({ ...d, total: Math.round(d.total * ratio) }));
    // Use exact DSR "Today" value for the last day
    if (scaled.length > 0 && dsrTotals.todayRev > 0) {
      scaled[scaled.length - 1] = { ...scaled[scaled.length - 1], total: dsrTotals.todayRev };
    }
    return scaled;
  }, [dailyRevenue, specialties, dsrTotals]);

  const dailyAvg = useMemo(() => {
    if (!scaledDailyRevenue.length) return 0;
    return Math.round(scaledDailyRevenue.reduce((a, d) => a + d.total, 0) / scaledDailyRevenue.length);
  }, [scaledDailyRevenue]);

  // Linear regression trendline for daily revenue
  const dailyWithTrend = useMemo(() => {
    const data = scaledDailyRevenue;
    if (data.length < 2) return data;
    const n = data.length;
    const sumX = data.reduce((a, _, i) => a + i, 0);
    const sumY = data.reduce((a, d) => a + d.total, 0);
    const sumXY = data.reduce((a, d, i) => a + i * d.total, 0);
    const sumX2 = data.reduce((a, _, i) => a + i * i, 0);
    const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
    const intercept = (sumY - slope * sumX) / n;
    return data.map((d, i) => ({ ...d, trend: Math.round(intercept + slope * i) }));
  }, [scaledDailyRevenue]);

  const specTotals = useMemo(() => {
    const sum = (k) => specialties.reduce((a,s) => a + (s[k]||0), 0);
    const [tr,mA,mB,mL,yA,yB,yL] = ["today","mtdActual","mtdBudget","mtdLY","ytdActual","ytdBudget","ytdLY"].map(sum);
    return { todayRev:tr, mtdActual:mA, mtdBudget:mB, mtdLY:mL, mtdVarBudget:mB?(mA-mB)/mB:0, mtdVarLY:mL?(mA-mL)/mL:0, ytdActual:yA, ytdBudget:yB, ytdLY:yL, ytdVarBudget:yB?(yA-yB)/yB:0, ytdVarLY:yL?(yA-yL)/yL:0 };
  }, [specialties]);

  const sorted = useMemo(() => [...specialties].sort((a,b) => (b.ytdActual||0)-(a.ytdActual||0)), [specialties]);

  const insights = useMemo(() => {
    const above = specialties.filter(s => s.mtdVarLY >= 0).length;
    return { above, below: specialties.length - above, growingYoY: specialties.filter(s => s.ytdVarLY > 0).length, total: specialties.length };
  }, [specialties]);

  const clinicChartData = useMemo(() =>
    [...locations].filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location)).sort((a,b) => b.totalRevenueMTD - a.totalRevenueMTD).map(l => ({
      name: CLINIC_COORDS[l.location]?.label || l.location,
      code: l.location,
      revenue: l.totalRevenueMTD,
    })), [locations]);

  const clinicVolChartData = useMemo(() => {
    const days = dsrTotals.daysElapsed || 1;
    return [...locations].filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location) && (l.opVolMTD > 0 || (l.opVolMTDLY || 0) > 0))
      .sort((a, b) => (b.opVolMTD || 0) - (a.opVolMTD || 0))
      .map(l => ({
        name: CLINIC_COORDS[l.location]?.label || l.location,
        code: l.location,
        "2026": Math.round((l.opVolMTD || 0) / days),
        "2025": Math.round((l.opVolMTDLY || 0) / days),
      }));
  }, [locations, dsrTotals]);

  const clinicPPCChartData = useMemo(() =>
    [...locations].filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location) && (l.ppcYTD > 0 || (l.ppcYTDLY || 0) > 0))
      .sort((a, b) => (b.ppcYTD || 0) - (a.ppcYTD || 0))
      .map(l => ({
        name: CLINIC_COORDS[l.location]?.label || l.location,
        code: l.location,
        "2026": l.ppcYTD || 0,
        "2025": l.ppcYTDLY || 0,
      })), [locations]);

  const clinicYTDChartData = useMemo(() =>
    [...locations].filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location) && (l.totalRevenueYTD > 0 || (l.ytdLY || 0) > 0))
      .sort((a, b) => b.totalRevenueYTD - a.totalRevenueYTD)
      .map(l => ({
        name: CLINIC_COORDS[l.location]?.label || l.location,
        code: l.location,
        "2026": l.totalRevenueYTD,
        "2025": l.ytdLY || 0,
      })), [locations]);

  // Filter out minor specialties (< AED 10K MTD and < AED 50K YTD) from charts
  const chartSpecialties = useMemo(() => sorted.filter(s => s.mtdActual >= 10000 || s.ytdActual >= 50000), [sorted]);
  const barChartData = useMemo(() => chartSpecialties.slice(0,10).map(s => ({ name: s.name.length > 14 ? s.name.slice(0,13)+"\u2026" : s.name, "Last Year": s.mtdLY, "This Year": s.mtdActual })), [chartSpecialties]);
  const varianceData = useMemo(() => chartSpecialties.filter(s => s.mtdActual > 0 || s.mtdLY > 0).map(s => ({ name: s.name.length > 12 ? s.name.slice(0,11)+"\u2026" : s.name, variance: s.mtdActual - s.mtdLY, fill: s.mtdVarLY >= 0 ? C.success : C.danger })), [chartSpecialties]);
  const pieData = useMemo(() => { const filtered = sorted.filter(s => s.ytdActual >= 50000); const tot = filtered.reduce((a,s) => a+s.ytdActual, 0); return filtered.map((s,i) => ({ name:s.name, value:s.ytdActual, pctShare: tot ? s.ytdActual/tot : 0, fill: PALETTE[i%PALETTE.length] })); }, [sorted]);

  const ipTotals = useMemo(() => {
    const mtdA = ipSpecialties.reduce((a,s) => a + s.mtdActual, 0);
    const mtdL = ipSpecialties.reduce((a,s) => a + s.mtdLY, 0);
    const mtdB = ipSpecialties.reduce((a,s) => a + s.mtdBudget, 0);
    const vol = ipSpecialties.reduce((a,s) => a + s.mtdVolume, 0);
    const volLY = ipSpecialties.reduce((a,s) => a + (s.mtdVolLY||0), 0);
    const ytdA = ipSpecialties.reduce((a,s) => a + (s.ytdActual||0), 0);
    const ytdL = ipSpecialties.reduce((a,s) => a + (s.ytdLY||0), 0);
    return { mtdActual: mtdA, mtdLY: mtdL, mtdBudget: mtdB, volume: vol, volumeLY: volLY, mtdVarLY: mtdL ? (mtdA-mtdL)/mtdL : 0, ytdActual: ytdA, ytdLY: ytdL, ytdVarLY: ytdL ? (ytdA-ytdL)/ytdL : 0 };
  }, [ipSpecialties]);

  // OP+Pharmacy PPC = (DSR total - IP revenue) / OP visit count
  const opPharmaPPC = useMemo(() => {
    const opPharmaRev = dsrTotals.mtdActual - ipTotals.mtdActual;
    const opPharmaRevLY = dsrTotals.mtdLY - ipTotals.mtdLY;
    const ppc = dsrTotals.opMtdVolume ? Math.round(opPharmaRev / dsrTotals.opMtdVolume) : 0;
    const ppcLY = dsrTotals.opMtdLYVolume ? Math.round(opPharmaRevLY / dsrTotals.opMtdLYVolume) : 0;
    return { ppc, ppcLY };
  }, [dsrTotals, ipTotals]);

  const underperformingSpecs = useMemo(() => {
    return specialties
      .filter(s => s.ytdVarLY < 0)
      .sort((a, b) => a.ytdVarLY - b.ytdVarLY)
      .map(spec => ({
        ...spec,
        doctors: doctors.filter(d => d.specialty === spec.name).sort((a, b) => (a.ytdVarLY || 0) - (b.ytdVarLY || 0))
      }));
  }, [specialties, doctors]);

  const specialtyDrillData = useMemo(() => {
    if (!selectedSpecialty) return null;
    const spec = specialties.find(s => s.name === selectedSpecialty);

    // Find doctors from OP doctors list
    let specDoctors = doctors.filter(d => d.specialty === selectedSpecialty);

    // Also check IP doctors if no OP doctors found (or if this is an IP specialty)
    const ipSpecDoctors = ipDoctors.filter(d => d.specialty === selectedSpecialty);

    // If we have IP doctors but no OP spec data, create a synthetic spec
    const ipSpec = ipSpecialties.find(s => s.name === selectedSpecialty);

    if (!spec && ipSpec) {
      // Pure IP specialty
      return {
        spec: { name: selectedSpecialty, today: 0, mtdActual: ipSpec.mtdActual, mtdLY: ipSpec.mtdLY, mtdBudget: ipSpec.mtdBudget, ytdActual: ipSpec.ytdActual || 0, ytdLY: ipSpec.ytdLY || 0, ytdBudget: ipSpec.ytdBudget || 0, mtdVarLY: ipSpec.mtdLY ? (ipSpec.mtdActual - ipSpec.mtdLY) / ipSpec.mtdLY : 0, ytdVarLY: ipSpec.ytdLY ? ((ipSpec.ytdActual||0) - (ipSpec.ytdLY||0)) / ipSpec.ytdLY : 0 },
        doctors: ipSpecDoctors.map(d => ({ name: d.name, specialty: d.specialty, today: 0, mtdActual: d.mtdRevenue, mtdLY: 0, ytdActual: 0, ytdLY: 0, locations: d.locations || "" })),
        isIP: true,
      };
    }

    if (!spec) return null;

    // Combine OP and IP doctors
    const allDoctors = [...specDoctors];
    if (ipSpecDoctors.length > 0) {
      ipSpecDoctors.forEach(ipd => {
        if (!allDoctors.find(d => d.name === ipd.name)) {
          allDoctors.push({ name: ipd.name, specialty: ipd.specialty, today: 0, mtdActual: ipd.mtdRevenue, mtdLY: 0, ytdActual: 0, ytdLY: 0, locations: ipd.locations || "" });
        }
      });
    }

    return { spec, doctors: allDoctors.sort((a, b) => b.mtdActual - a.mtdActual) };
  }, [selectedSpecialty, specialties, doctors, ipDoctors, ipSpecialties]);

  const commentary = useMemo(() => {
    const lines = [];
    const ytdVarLY = totals.ytdLY ? ((totals.ytdActual - totals.ytdLY) / totals.ytdLY * 100).toFixed(1) : 0;
    const avgPerDay = Math.round(totals.mtdActual / (dsrTotals.daysElapsed || 1));

    if (totals.ytdVarLY < 0) lines.push("YTD revenue of AED " + fmtK(totals.ytdActual) + " is " + ytdVarLY + "% below last year (AED " + fmtK(totals.ytdLY) + "), indicating a need for focused recovery strategies.");
    else lines.push("YTD revenue of AED " + fmtK(totals.ytdActual) + " is +" + ytdVarLY + "% above last year.");

    lines.push("MTD revenue stands at AED " + fmt(totals.mtdActual) + ", averaging AED " + fmt(avgPerDay) + " per day across " + (dsrTotals.daysElapsed || 1) + " operating days.");

    const underCount = specialties.filter(s => s.ytdVarLY < 0).length;
    if (underCount > 0) {
      const worst = [...specialties].filter(s => s.ytdVarLY < 0 && s.ytdLY > 0).sort((a,b) => a.ytdVarLY - b.ytdVarLY).slice(0,3).map(s => s.name);
      lines.push(underCount + " of " + specialties.length + " specialties are underperforming vs last year at YTD level. Key areas of concern: " + worst.join(', ') + ".");
    }

    const topLoc = [...locations].filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location)).sort((a,b) => b.totalRevenueMTD - a.totalRevenueMTD)[0];
    if (topLoc) lines.push("Top performing location: " + (CLINIC_COORDS[topLoc.location]?.label || topLoc.location) + " with AED " + fmt(topLoc.totalRevenueMTD) + " MTD revenue.");

    if (ipTotals.mtdActual > 0) {
      const ipVar = ipTotals.mtdVarLY;
      lines.push("Inpatient revenue: AED " + fmt(ipTotals.mtdActual) + " MTD (" + (ipVar >= 0 ? '+' : '') + (ipVar*100).toFixed(1) + "% vs LY) with " + ipTotals.volume + " cases.");
    }

    // Revenue loss from resigned doctors
    const resignedDocs = doctors.filter(d => !getDoctorProfileUrl(d.name) && d.ytdLY > 0);
    if (resignedDocs.length > 0) {
      const resignedYtdLY = resignedDocs.reduce((a, d) => a + (d.ytdLY || 0), 0);
      const resignedMtdLY = resignedDocs.reduce((a, d) => a + (d.mtdLY || 0), 0);
      const resignedYtdActual = resignedDocs.reduce((a, d) => a + (d.ytdActual || 0), 0);
      const revLoss = resignedYtdLY - resignedYtdActual;
      lines.push("Revenue impact from " + resignedDocs.length + " resigned doctors: AED " + fmt(revLoss) + " YTD revenue gap (LY revenue: AED " + fmt(resignedYtdLY) + ").");
    }

    // CBD doctors impact
    const cbdDocs = doctors.filter(d => isCBD(d.name));
    if (cbdDocs.length > 0) {
      const cbdMtd = cbdDocs.reduce((a, d) => a + (d.mtdActual || 0), 0);
      const cbdMtdLY = cbdDocs.reduce((a, d) => a + (d.mtdLY || 0), 0);
      lines.push(cbdDocs.length + " CBD doctors generating AED " + fmt(cbdMtd) + " MTD (vs LY: AED " + fmt(cbdMtdLY) + "). Potential for increased utilization.");
    }

    // Dubai South vs total MTD
    const SOUTH = new Set(["Tecom","JVC","DG","Fest Plaza"]);
    const southMTD = locations.filter(l => SOUTH.has(l.location)).reduce((a,l) => a + l.totalRevenueMTD, 0);
    const totalClinicMTD = locations.filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location)).reduce((a,l) => a + l.totalRevenueMTD, 0);
    const southPct = totalClinicMTD ? ((southMTD / totalClinicMTD) * 100).toFixed(1) : 0;
    lines.push("Dubai South clinics (Tecom, JVC, Discovery Gardens, Festival Plaza) contribute " + southPct + "% of total clinic MTD revenue (AED " + fmt(southMTD) + " of AED " + fmt(totalClinicMTD) + ").");

    // OP Volume commentary
    const totalVolMTD = locations.filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location)).reduce((a,l) => a + (l.opVolMTD || 0), 0);
    const totalVolLY = locations.filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location)).reduce((a,l) => a + (l.opVolMTDLY || 0), 0);
    const days = dsrTotals.daysElapsed || 1;
    const avgVolPerDay = Math.round(totalVolMTD / days);
    const avgVolPerDayLY = Math.round(totalVolLY / days);
    if (totalVolMTD > 0) {
      const volVar = totalVolLY ? ((totalVolMTD - totalVolLY) / totalVolLY * 100).toFixed(1) : 0;
      const growingClinics = locations.filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location) && l.opVolMTD > 0 && l.opVolMTDLY > 0 && l.opVolMTD > l.opVolMTDLY).map(l => CLINIC_COORDS[l.location]?.label || l.location);
      lines.push("OP volume: " + fmt(totalVolMTD) + " visits MTD (" + avgVolPerDay + " avg/day), " + (totalVolLY ? volVar + "% vs LY (" + fmt(totalVolLY) + " visits, " + avgVolPerDayLY + " avg/day)" : "no LY data") + "." + (growingClinics.length > 0 ? " Volume growth at: " + growingClinics.join(", ") + "." : ""));
    }

    // Monthly context
    const bestMonth = MONTHLY_HISTORY.reduce((best, m) => m.revenue > best.revenue ? m : best, MONTHLY_HISTORY[0]);
    const projectedMonth = Math.round(totals.mtdActual / (dsrTotals.daysElapsed || 1) * 30);
    lines.push("At current pace, April is projected to reach AED " + fmtK(projectedMonth) + " (" + (projectedMonth > bestMonth.revenue ? "above" : "below") + " " + bestMonth.month + "'s AED " + fmtK(bestMonth.revenue) + ").");

    return lines;
  }, [totals, dsrTotals, specialties, locations, ipTotals, doctors]);

  // Filter active doctors (exclude resigned)
  const isActive = (d) => !!getDoctorProfileUrl(d.name);
  const activeDoctors = useMemo(() => doctors.filter(isActive), [doctors]);
  const resignedWithRevenue = useMemo(() => {
    const resigned = doctors.filter(d => !getDoctorProfileUrl(d.name) && (d.ytdLY || 0) > 0);
    // Group by specialty
    const specMap = {};
    resigned.forEach(d => {
      if (!specMap[d.specialty]) specMap[d.specialty] = { name: d.specialty, doctors: [], ytdLY: 0, ytdActual: 0, mtdLY: 0, mtdActual: 0 };
      specMap[d.specialty].doctors.push(d);
      specMap[d.specialty].ytdLY += d.ytdLY || 0;
      specMap[d.specialty].ytdActual += d.ytdActual || 0;
      specMap[d.specialty].mtdLY += d.mtdLY || 0;
      specMap[d.specialty].mtdActual += d.mtdActual || 0;
    });
    return Object.values(specMap).sort((a, b) => b.ytdLY - a.ytdLY);
  }, [doctors]);

  const topPerformers = useMemo(() => [...activeDoctors].sort((a,b)=>(b.ytdActual||0)-(a.ytdActual||0)).slice(0,10), [activeDoctors]);
  const needsAttention = useMemo(() => activeDoctors.filter(d=>d.mtdLY>5000&&d.mtdVarLY<-0.2).sort((a,b)=>a.mtdVarLY-b.mtdVarLY).slice(0,15), [activeDoctors]);
  const bottomPerformers = useMemo(() => activeDoctors.filter(d=>d.ytdLY>50000).sort((a,b)=>a.ytdVarLY-b.ytdVarLY).slice(0,10), [activeDoctors]);

  return (
    <div style={{ display:"flex", minHeight:"100vh", background:C.pageBg }}>
      <Sidebar activeSection={activeSection} onNavigate={scrollToSection} reportDate={reportDate} onFileLoaded={handleFileLoaded} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} isMobile={isMobile} loadHistoricalMonth={loadHistoricalMonth} loadCurrentMonth={loadCurrentMonth} historicalMonth={historicalMonth} />

      <main style={{ flex:1, marginLeft: isMobile ? 0 : (sidebarOpen ? 220 : 64), transition:"margin-left 0.3s", padding: isMobile ? "68px 12px 16px" : "24px 32px", maxWidth:1400, overflowX:"hidden" }}>

        {/* HEADER */}
        <div style={{ display:"flex", flexDirection: isMobile ? "column" : "row", justifyContent:"space-between", alignItems: isMobile ? "flex-start" : "center", marginBottom:24, gap: isMobile ? 12 : 0 }}>
          <div>
            <h1 style={{ fontSize: isMobile ? 18 : 22, fontWeight:700, color:C.text, margin:0 }}>Executive Revenue Summary</h1>
            <p style={{ fontSize: isMobile ? 12 : 13, color:C.textMuted, margin:"4px 0 0" }}>Al-Futtaim Health — Daily Sales Report</p>
          </div>
          <div style={{ display:"flex", gap:12, alignItems:"center" }}>
            {!isMobile && <div style={{ background:C.cardBg, border:"1px solid "+C.border, borderRadius:8, padding:"6px 14px" }}>
              <span style={{ fontSize:11, color:C.textMuted }}>Report Date</span>
              <span style={{ fontSize:13, fontWeight:600, color:C.text, marginLeft:8 }}>{reportDate}</span>
            </div>}
            {isMobile && <UploadZone onFileLoaded={handleFileLoaded} compact />}
          </div>
        </div>

        {/* DATA VALIDATION WARNINGS */}
        {dataWarnings.length > 0 && (
          <div style={{ ...card, background:"rgba(245,158,11,0.1)", border:"1px solid rgba(245,158,11,0.3)", padding:"14px 20px", marginBottom:16 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <span style={{ fontSize:13, fontWeight:700, color:"#f59e0b" }}>Data Validation Warnings</span>
            </div>
            <ul style={{ margin:0, paddingLeft:20, listStyle:"disc" }}>
              {dataWarnings.map((w, i) => <li key={i} style={{ fontSize:12, color:"#fbbf24", marginBottom:2 }}>{w}</li>)}
            </ul>
          </div>
        )}

        {/* HISTORICAL DATA BANNER */}
        {historicalMonth && (
          <div style={{ ...card, background:"rgba(59,130,246,0.1)", border:"1px solid rgba(59,130,246,0.3)", padding:"10px 20px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ fontSize:13, color:C.primaryLight }}>Viewing historical data for <strong>{MONTHLY_HISTORY.find(m => m.monthKey === historicalMonth)?.month}</strong></span>
            <button onClick={loadCurrentMonth} style={{ background:C.primary, border:"none", borderRadius:6, padding:"4px 12px", color:"#fff", fontSize:11, fontWeight:600, cursor:"pointer" }}>Back to Current</button>
          </div>
        )}

        {/* EXECUTIVE SUMMARY */}
        <div style={{ ...card, padding: isMobile ? "14px 16px" : "20px 28px", marginBottom:20 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.primary} strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            <h3 style={{ margin:0, fontSize:15, fontWeight:700, color:C.text }}>Executive Summary</h3>
          </div>
          <ul style={{ margin:0, paddingLeft: isMobile ? 16 : 20, listStyle:"disc" }}>
            {commentary.map((line, i) => (
              <li key={i} style={{ fontSize: isMobile ? 12 : 13, lineHeight:1.7, color:C.textSecondary, marginBottom:4, wordWrap:"break-word", overflowWrap:"break-word" }}>{line}</li>
            ))}
          </ul>
        </div>

        {/* KPI STRIP */}
        <div id="overview" style={{ display:"grid", gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(5, 1fr)", gap: isMobile ? 10 : 16 }}>
          <div style={{ ...card, padding:"22px 24px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:`linear-gradient(90deg, ${C.primaryDark}, ${C.accent})` }} />
            <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>Today's Revenue</div>
            <div style={{ fontSize: isMobile ? 20 : 30, fontWeight:800, color:C.text, marginTop:8, letterSpacing:"-0.03em" }}>AED {fmt(totals.todayRev)}</div>
            <div style={{ fontSize:11, color:C.textMuted, marginTop:4 }}>{reportDate}</div>
          </div>
          <div style={{ ...card, padding:"22px 24px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:`linear-gradient(90deg, ${C.accent}, ${C.primaryLight})` }} />
            <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>MTD Revenue</div>
            <div style={{ fontSize: isMobile ? 18 : 26, fontWeight:800, color:C.text, marginTop:8 }}>AED {fmt(totals.mtdActual)}</div>
            <div style={{ display:"flex", gap:8, marginTop:8 }}>
              <span style={{ fontSize:11, fontWeight:600, color:varColor(totals.mtdVarLY), background:varBg(totals.mtdVarLY), padding:"2px 8px", borderRadius:6 }}>vs LY {pct(totals.mtdVarLY)}</span>
              <span style={{ fontSize:11, fontWeight:600, color:varColor(totals.mtdVarBudget), background:varBg(totals.mtdVarBudget), padding:"2px 8px", borderRadius:6 }}>vs Budget {pct(totals.mtdVarBudget)}</span>
            </div>
          </div>
          <div style={{ ...card, padding:"22px 24px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:`linear-gradient(90deg, ${C.success}, ${C.successLight})` }} />
            <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>YTD Revenue</div>
            <div style={{ fontSize: isMobile ? 18 : 26, fontWeight:800, color:C.text, marginTop:8 }}>AED {fmt(totals.ytdActual)}</div>
            <div style={{ display:"flex", gap:8, marginTop:8 }}>
              <span style={{ fontSize:11, fontWeight:600, color:varColor(totals.ytdVarLY), background:varBg(totals.ytdVarLY), padding:"2px 8px", borderRadius:6 }}>vs LY {pct(totals.ytdVarLY)}</span>
              <span style={{ fontSize:11, fontWeight:600, color:varColor(totals.ytdVarBudget), background:varBg(totals.ytdVarBudget), padding:"2px 8px", borderRadius:6 }}>vs Budget {pct(totals.ytdVarBudget)}</span>
            </div>
          </div>
          <div style={{ ...card, padding:"14px 16px", display:"flex", alignItems:"center", justifyContent:"space-around", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:`linear-gradient(90deg, ${C.warning}, ${C.warningLight})` }} />
            <BudgetGauge label="MTD YoY" actual={totals.mtdActual} comparison={totals.mtdLY} size={100} />
            <BudgetGauge label="YTD YoY" actual={totals.ytdActual} comparison={totals.ytdLY} size={100} />
          </div>
          <div style={{ ...card, padding:"22px 24px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:"linear-gradient(90deg, #8b5cf6, #a855f7)" }} />
            <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>Avg Revenue/Day</div>
            <div style={{ fontSize: isMobile ? 18 : 26, fontWeight:800, color:C.text, marginTop:8 }}>AED {fmt(Math.round(totals.mtdActual / (dsrTotals.daysElapsed || 1)))}</div>
            <div style={{ fontSize:11, color:C.textMuted, marginTop:4 }}>{dsrTotals.daysElapsed || 1} days</div>
          </div>
        </div>

        {/* PPC STRIP */}
        <div style={{ display:"grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(4, 1fr)", gap: isMobile ? 10 : 16, marginTop:16 }}>
          <div style={{ ...card, padding:"18px 24px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:"linear-gradient(90deg, #8b5cf6, #a855f7)" }} />
            <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>Avg Revenue per OP Visit (MTD)</div>
            <div style={{ display:"flex", alignItems:"baseline", gap:12, marginTop:8 }}>
              <div style={{ fontSize: isMobile ? 18 : 24, fontWeight:800, color:C.text }}>AED {fmt(opPharmaPPC.ppc)}</div>
              <div style={{ fontSize:12, color:C.textMuted }}>vs LY: AED {fmt(opPharmaPPC.ppcLY)}</div>
            </div>
            <div style={{ display:"flex", gap:8, marginTop:6 }}>
              <span style={{ fontSize:11, fontWeight:600, color:varColor(opPharmaPPC.ppcLY ? (opPharmaPPC.ppc - opPharmaPPC.ppcLY) / opPharmaPPC.ppcLY : 0), background:varBg(opPharmaPPC.ppcLY ? (opPharmaPPC.ppc - opPharmaPPC.ppcLY) / opPharmaPPC.ppcLY : 0), padding:"2px 8px", borderRadius:6 }}>{pct(opPharmaPPC.ppcLY ? (opPharmaPPC.ppc - opPharmaPPC.ppcLY) / opPharmaPPC.ppcLY : 0)} vs LY</span>
              <span style={{ fontSize:11, color:C.textMuted }}>{fmt(dsrTotals.opMtdVolume)} visits</span>
            </div>
          </div>
          <div style={{ ...card, padding:"18px 24px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:"linear-gradient(90deg, #ec4899, #f472b6)" }} />
            <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>Avg Revenue per IP Case (MTD)</div>
            <div style={{ display:"flex", alignItems:"baseline", gap:12, marginTop:8 }}>
              <div style={{ fontSize: isMobile ? 18 : 24, fontWeight:800, color:C.text }}>AED {fmt(ipTotals.mtdActual && ipTotals.volume ? Math.round(ipTotals.mtdActual / ipTotals.volume) : 0)}</div>
              <div style={{ fontSize:12, color:C.textMuted }}>vs LY: AED {fmt(ipTotals.mtdLY && ipTotals.volumeLY ? Math.round(ipTotals.mtdLY / ipTotals.volumeLY) : 0)}</div>
            </div>
            <div style={{ display:"flex", gap:8, marginTop:6 }}>
              {(() => { const curr = ipTotals.volume ? ipTotals.mtdActual / ipTotals.volume : 0; const ly = ipTotals.volumeLY ? ipTotals.mtdLY / ipTotals.volumeLY : 0; const v = ly ? (curr - ly) / ly : 0; return <span style={{ fontSize:11, fontWeight:600, color:varColor(v), background:varBg(v), padding:"2px 8px", borderRadius:6 }}>{pct(v)} vs LY</span>; })()}
              <span style={{ fontSize:11, color:C.textMuted }}>{ipTotals.volume} cases (LY: {ipTotals.volumeLY || 0})</span>
            </div>

      {selectedClinic && (() => {
        let enrichedClinic = selectedClinic;
        if (!selectedClinic.specialties || selectedClinic.specialties.length === 0 || selectedClinic.specialties.every(s => s.doctors.length === 0)) {
          // Build specialties from doctors state using location data
          const clinicDocs = doctors.filter(d => d.locations && d.locations.includes(selectedClinic.location));
          const specMap = {};
          clinicDocs.forEach(d => {
            if (!specMap[d.specialty]) specMap[d.specialty] = [];
            specMap[d.specialty].push(d);
          });
          const specs = Object.keys(specMap).map(name => {
            const ds = specMap[name];
            return { name, today: ds.reduce((a,d) => a + (d.today||0), 0), mtdActual: ds.reduce((a,d) => a + d.mtdActual, 0), mtdBudget: ds.reduce((a,d) => a + d.mtdBudget, 0), mtdLY: ds.reduce((a,d) => a + (d.mtdLY||0), 0), ytdActual: ds.reduce((a,d) => a + d.ytdActual, 0), ytdBudget: ds.reduce((a,d) => a + d.ytdBudget, 0), ytdLY: ds.reduce((a,d) => a + (d.ytdLY||0), 0), doctors: ds.sort((a,b) => b.mtdActual - a.mtdActual) };
          }).sort((a,b) => b.mtdActual - a.mtdActual);
          const mtdLY = specs.reduce((a,s) => a + (s.mtdLY||0), 0);
          const ytdLY = specs.reduce((a,s) => a + (s.ytdLY||0), 0);
          enrichedClinic = { ...selectedClinic, specialties: specs, mtdLY: selectedClinic.mtdLY || mtdLY, ytdLY: selectedClinic.ytdLY || ytdLY };
        }
        return <ClinicDrillDown clinic={enrichedClinic} onClose={() => setSelectedClinic(null)} />;
      })()}
      {specialtyDrillData && <SpecialtyDrillDown data={specialtyDrillData} doctorLocations={doctorLocations} onClose={() => setSelectedSpecialty(null)} />}
      <DashboardChat totals={totals} dsrTotals={dsrTotals} specialties={specialties} locations={locations} ipTotals={ipTotals} doctors={doctors} reportDate={reportDate} isMobile={isMobile} />
    </div>
  );
}

try {
  ReactDOM.render(<App />, document.getElementById("root"));
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace;color:#ef4444"><h2>Render Error</h2><pre>'+e.message+'</pre><pre>'+e.stack+'</pre></div>';
}
</script>
</body>
</html>
