// ─── Excel Parser ────────────────────────────────────────────────────────────

function parseExcelFile(data) {
  const wb = XLSX.read(data, { type: "array" });
  const ssName = wb.SheetNames.find((n) => n.toLowerCase().includes("specialty"));
  if (!ssName) throw new Error("Sheet not found");
  const ws = wb.Sheets[ssName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  let headerIdx = 4;
  for (let i = 0; i < 10; i++) { const r = rows[i] || []; if (r.join(" ").toLowerCase().match(/specialty|doctor/)) { headerIdx = i; break; } }
  const num = (v) => (typeof v === "number" ? v : parseFloat(v) || 0);
  const specialties = [], doctors = [];
  for (let i = headerIdx + 2; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const colA = r[0], colB = r[1];
    if (!colB || typeof colB !== "string" || colB.toLowerCase().includes("grand total")) continue;
    const today=num(r[2]),mtdBudget=num(r[3]),mtdActual=num(r[4]),mtdLY=num(r[5]),mtdVBR=num(r[6]),mtdVLR=num(r[7]),ytdBudget=num(r[8]),ytdActual=num(r[9]),ytdLY=num(r[10]);
    if (colB.includes("Total")) {
      const name = colB.replace(/\s*Total\s*/i,"").trim(); if (!name) continue;
      specialties.push({ name, today, mtdActual, mtdBudget, mtdLY, mtdVarBudget: mtdBudget ? mtdVBR||(mtdActual-mtdBudget)/mtdBudget : 0, mtdVarLY: mtdLY ? mtdVLR||(mtdActual-mtdLY)/mtdLY : 0, ytdActual, ytdBudget, ytdLY, ytdVarBudget: ytdBudget ? (ytdActual-ytdBudget)/ytdBudget : 0, ytdVarLY: ytdLY ? (ytdActual-ytdLY)/ytdLY : 0 });
    } else if (colA && typeof colA === "string" && colA.trim()) {
      doctors.push({ name: colA.trim(), specialty: colB.trim(), today, mtdActual, mtdBudget, mtdLY, ytdActual, ytdBudget, ytdLY, mtdVarBudget: mtdBudget ? (mtdActual-mtdBudget)/mtdBudget : 0, ytdVarBudget: ytdBudget ? (ytdActual-ytdBudget)/ytdBudget : 0 });
    }
  }
  let reportDate = DEFAULT_REPORT_DATE;
  const dsrName = wb.SheetNames.find((n) => n.toUpperCase().includes("DSR"));
  if (dsrName) { const dsRows = XLSX.utils.sheet_to_json(wb.Sheets[dsrName], { header:1, defval:null }); for (let i=0;i<6;i++) { const r=dsRows[i]; if(!r) continue; for (const cell of r) { if (cell instanceof Date) { reportDate=cell.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); break; } if (typeof cell==="string" && /apr|may|jun|mar|feb|jan/i.test(cell)) { reportDate=cell; break; } } } }
  return { specialties, doctors, reportDate };
}

function PieTooltip({ active, payload }) {
  if (!active || !payload?.length) return null;
  const d = payload[0];
  return (
    <div style={{ background:"#fff", borderRadius:10, padding:"12px 16px", boxShadow:"0 8px 30px rgba(0,0,0,0.12)", border:"1px solid #e2e8f0" }}>

    </div>
  );
}

// ─── Budget Gauge ────────────────────────────────────────────────────────────

function BudgetGauge({ label, actual, budget, size = 120 }) {
  const pctVal = budget ? actual / budget : 0;
  const capped = Math.min(pctVal, 1.2);
  const color = pctVal >= 1 ? C.success : pctVal >= 0.9 ? C.warning : C.danger;
  const data = [{ name: label, value: capped * 100, fill: color }];
  return (
    <div style={{ textAlign: "center" }}>
      <ResponsiveContainer width={size} height={size}>
        <RadialBarChart cx="50%" cy="50%" innerRadius="70%" outerRadius="100%" startAngle={210} endAngle={-30} data={data} barSize={10}>
          <RadialBar background={{ fill:"#f1f5f9" }} dataKey="value" cornerRadius={8} />
        </RadialBarChart>
      </ResponsiveContainer>
      <div style={{ marginTop: -size * 0.45, position: "relative", zIndex: 1 }}>
        <div style={{ fontSize: 20, fontWeight: 800, color, letterSpacing: "-0.02em" }}>{(pctVal*100).toFixed(0)}%</div>
        <div style={{ fontSize: 10, color: C.slateLight, textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 600, marginTop: 2 }}>{label}</div>
      </div>
      <div style={{ height: size * 0.15 }} />
    </div>
  );
}

// ─── Upload Zone ─────────────────────────────────────────────────────────────

function UploadZone({ onFileLoaded }) {
  const [isDrag, setIsDrag] = useState(false);
  const [status, setStatus] = useState(null);
  const inputRef = useRef(null);
  const processFile = useCallback((file) => {
    if (!file) return; setStatus("loading");
    const reader = new FileReader();
    reader.onload = (e) => {
      try { const parsed = parseExcelFile(new Uint8Array(e.target.result)); if (!parsed.specialties.length) { setStatus("error"); return; } onFileLoaded(parsed); setStatus("success"); setTimeout(() => setStatus(null), 3000); }
      catch(err) { console.error(err); setStatus("error"); setTimeout(() => setStatus(null), 4000); }
    };
    reader.readAsArrayBuffer(file);
  }, [onFileLoaded]);
  return (
    <div onDragOver={(e)=>{e.preventDefault();setIsDrag(true);}} onDragLeave={()=>setIsDrag(false)} onDrop={(e)=>{e.preventDefault();setIsDrag(false);processFile(e.dataTransfer.files[0]);}} onClick={()=>inputRef.current?.click()}
      style={{ border:`2px dashed ${isDrag ? C.primary : "#cbd5e1"}`, borderRadius:14, padding:"14px 28px", background: isDrag ? "#eff6ff" : "#f8fafc", transition:"all 0.25s", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:14 }}>
      <input ref={inputRef} type="file" accept=".xlsx,.xls" style={{ display:"none" }} onChange={(e)=>processFile(e.target.files[0])} />
      <div style={{ width:40, height:40, borderRadius:10, background: isDrag ? "#dbeafe" : "#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={isDrag ? C.primary : C.slateLight} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <div><span style={{ fontWeight:700, color:C.primary, fontSize:14 }}>Upload New Report</span><span style={{ color:C.slateLight, fontSize:13, marginLeft:8 }}>Drag & drop .xlsx or click</span></div>
      {status==="loading" && <div style={{ width:18, height:18, border:"2px solid #e2e8f0", borderTopColor:C.primary, borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />}
      {status==="success" && <span style={{ color:C.success, fontSize:13, fontWeight:700 }}>Updated</span>}
      {status==="error" && <span style={{ color:C.danger, fontSize:13, fontWeight:700 }}>Parse error</span>}
    </div>
  );
}

    setSpecialties(specs.map((s) => ({ ...s,
      mtdVarBudget: s.mtdVarBudget || (s.mtdBudget ? (s.mtdActual-s.mtdBudget)/s.mtdBudget : 0),
      mtdVarLY: s.mtdVarLY || (s.mtdLY ? (s.mtdActual-s.mtdLY)/s.mtdLY : 0),
      ytdVarBudget: s.ytdBudget ? (s.ytdActual-s.ytdBudget)/s.ytdBudget : 0,
      ytdVarLY: s.ytdLY ? (s.ytdActual-s.ytdLY)/s.ytdLY : 0,
    })));
    if (docs?.length) setDoctors(docs);
    setReportDate(rd);
  }, []);

  const totals = useMemo(() => {
    const sum = (k) => specialties.reduce((a,s) => a + (s[k]||0), 0);
    const [tr,mA,mB,mL,yA,yB,yL] = ["today","mtdActual","mtdBudget","mtdLY","ytdActual","ytdBudget","ytdLY"].map(sum);
    return { todayRev:tr, mtdActual:mA, mtdBudget:mB, mtdLY:mL, mtdVarBudget:mB?(mA-mB)/mB:0, mtdVarLY:mL?(mA-mL)/mL:0, ytdActual:yA, ytdBudget:yB, ytdLY:yL, ytdVarBudget:yB?(yA-yB)/yB:0, ytdVarLY:yL?(yA-yL)/yL:0 };
  }, [specialties]);

  const sorted = useMemo(() => [...specialties].sort((a,b) => (b.ytdActual||0)-(a.ytdActual||0)), [specialties]);

  const insights = useMemo(() => {
    const above = specialties.filter(s => s.mtdVarBudget >= 0).length;
    return { above, below: specialties.length - above, growingYoY: specialties.filter(s => s.ytdVarLY > 0).length, total: specialties.length };
  }, [specialties]);

  const barChartData = useMemo(() => sorted.slice(0,10).map(s => ({ name: s.name.length > 14 ? s.name.slice(0,13)+"\u2026" : s.name, "This Year": s.mtdActual, Budget: s.mtdBudget, "Last Year": s.mtdLY })), [sorted]);
  const varianceData = useMemo(() => sorted.slice(0,10).map(s => ({ name: s.name.length > 12 ? s.name.slice(0,11)+"\u2026" : s.name, variance: s.mtdActual - s.mtdBudget, fill: s.mtdVarBudget >= 0 ? C.success : C.danger })), [sorted]);
  const pieData = useMemo(() => { const tot = sorted.reduce((a,s) => a+s.ytdActual, 0); return sorted.map((s,i) => ({ name:s.name, value:s.ytdActual, pctShare: tot ? s.ytdActual/tot : 0, fill: PALETTE[i%PALETTE.length] })); }, [sorted]);

  const topPerformers = useMemo(() => [...doctors].sort((a,b)=>(b.ytdActual||0)-(a.ytdActual||0)).slice(0,10), [doctors]);
  const needsAttention = useMemo(() => doctors.filter(d=>d.mtdBudget>5000&&d.mtdVarBudget<-0.3).sort((a,b)=>a.mtdVarBudget-b.mtdVarBudget).slice(0,10), [doctors]);
  const bottomPerformers = useMemo(() => doctors.filter(d=>d.ytdBudget>50000).sort((a,b)=>a.ytdVarBudget-b.ytdVarBudget).slice(0,10), [doctors]);

  return (
    <div style={{ background:"#f0f4f8", minHeight:"100vh" }}>

      {/* HEADER */}
      <div style={{ background:`linear-gradient(135deg, ${C.primaryDark} 0%, ${C.primary} 50%, ${C.accent} 100%)`, padding:"28px 40px 24px", boxShadow:"0 4px 20px rgba(3,105,161,0.25)" }}>
        <div style={{ maxWidth:1440, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div style={{ display:"flex", alignItems:"center", gap:16 }}>
            <div style={{ width:48, height:48, borderRadius:12, background:"rgba(255,255,255,0.15)", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:600, color:"rgba(186,230,253,0.8)", textTransform:"uppercase", letterSpacing:"0.1em" }}>Al-Futtaim Health</div>
              <h1 style={{ margin:0, fontSize:26, fontWeight:800, color:"#fff", letterSpacing:"-0.03em" }}>Executive Revenue Summary</h1>
            </div>
          </div>
          <div style={{ display:"flex", gap:12 }}>
            <div style={{ background:"rgba(255,255,255,0.12)", borderRadius:10, padding:"10px 20px" }}>
              <div style={{ fontSize:10, color:"rgba(186,230,253,0.7)", textTransform:"uppercase", letterSpacing:"0.08em", fontWeight:600 }}>Report Date</div>
              <div style={{ fontSize:16, fontWeight:700, color:"#fff", marginTop:2 }}>{reportDate}</div>
            </div>
            <div style={{ background:"rgba(255,255,255,0.12)", borderRadius:10, padding:"10px 20px" }}>
              <div style={{ fontSize:10, color:"rgba(186,230,253,0.7)", textTransform:"uppercase", letterSpacing:"0.08em", fontWeight:600 }}>Specialties</div>
              <div style={{ fontSize:16, fontWeight:700, color:"#fff", marginTop:2 }}>{specialties.length}</div>
            </div>
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div className="fade-in" style={{ maxWidth:1440, margin:"0 auto", padding:"24px 32px 40px" }}>

        <UploadZone onFileLoaded={handleFileLoaded} />

        {/* KPI STRIP */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:16, marginTop:24 }}>
          <div style={{ ...card, padding:"22px 24px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:`linear-gradient(90deg, ${C.primaryDark}, ${C.accent})` }} />
            <div style={{ fontSize:11, fontWeight:600, color:C.slate, textTransform:"uppercase", letterSpacing:"0.06em" }}>Today's Revenue</div>
            <div style={{ fontSize:30, fontWeight:800, color:C.primaryDark, marginTop:8, letterSpacing:"-0.03em" }}>AED {fmt(totals.todayRev)}</div>
            <div style={{ fontSize:11, color:C.slateLight, marginTop:4 }}>{reportDate}</div>
          </div>
          <div style={{ ...card, padding:"22px 24px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:`linear-gradient(90deg, ${C.accent}, ${C.primaryLight})` }} />
            <div style={{ fontSize:11, fontWeight:600, color:C.slate, textTransform:"uppercase", letterSpacing:"0.06em" }}>MTD Revenue</div>
            <div style={{ fontSize:26, fontWeight:800, color:C.primaryDark, marginTop:8 }}>AED {fmt(totals.mtdActual)}</div>
            <div style={{ display:"flex", gap:8, marginTop:8 }}>
              <span style={{ fontSize:11, fontWeight:600, color:varColor(totals.mtdVarBudget), background:varBg(totals.mtdVarBudget), padding:"2px 8px", borderRadius:6 }}>vs Budget {pct(totals.mtdVarBudget)}</span>
              <span style={{ fontSize:11, fontWeight:600, color:varColor(totals.mtdVarLY), background:varBg(totals.mtdVarLY), padding:"2px 8px", borderRadius:6 }}>vs LY {pct(totals.mtdVarLY)}</span>
            </div>
          </div>
          <div style={{ ...card, padding:"22px 24px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:`linear-gradient(90deg, ${C.success}, ${C.successLight})` }} />
            <div style={{ fontSize:11, fontWeight:600, color:C.slate, textTransform:"uppercase", letterSpacing:"0.06em" }}>YTD Revenue</div>
            <div style={{ fontSize:26, fontWeight:800, color:C.primaryDark, marginTop:8 }}>AED {fmt(totals.ytdActual)}</div>
            <div style={{ display:"flex", gap:8, marginTop:8 }}>
              <span style={{ fontSize:11, fontWeight:600, color:varColor(totals.ytdVarBudget), background:varBg(totals.ytdVarBudget), padding:"2px 8px", borderRadius:6 }}>vs Budget {pct(totals.ytdVarBudget)}</span>
              <span style={{ fontSize:11, fontWeight:600, color:varColor(totals.ytdVarLY), background:varBg(totals.ytdVarLY), padding:"2px 8px", borderRadius:6 }}>vs LY {pct(totals.ytdVarLY)}</span>
            </div>
          </div>
          <div style={{ ...card, padding:"14px 16px", display:"flex", alignItems:"center", justifyContent:"space-around", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:`linear-gradient(90deg, ${C.warning}, ${C.warningLight})` }} />
            <BudgetGauge label="MTD" actual={totals.mtdActual} budget={totals.mtdBudget} size={100} />
            <BudgetGauge label="YTD" actual={totals.ytdActual} budget={totals.ytdBudget} size={100} />
          </div>
        </div>

        {/* INSIGHTS STRIP */}
        <div style={{ ...card, marginTop:20, padding:"16px 28px", display:"flex", alignItems:"center", gap:32, flexWrap:"wrap" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:32, height:32, borderRadius:8, background:"#eff6ff", display:"flex", alignItems:"center", justifyContent:"center" }}>

          <div style={{ height:24, width:1, background:"#e2e8f0" }} />
          <div style={{ display:"flex", alignItems:"center", gap:6 }}><div style={{ width:8, height:8, borderRadius:"50%", background:C.danger }} /><span style={{ fontSize:12, color:"#475569" }}><strong style={{ color:C.danger }}>{insights.below}</strong> below MTD budget target</span></div>
          <div style={{ height:24, width:1, background:"#e2e8f0" }} />
          <div style={{ display:"flex", alignItems:"center", gap:6 }}><div style={{ width:8, height:8, borderRadius:"50%", background:C.primary }} /><span style={{ fontSize:12, color:"#475569" }}><strong style={{ color:C.primary }}>{insights.growingYoY}</strong> specialties growing YoY</span></div>
        </div>

        {/* CHARTS */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginTop:24 }}>
          {/* Bar Chart */}
          <div style={{ ...card, padding:28 }}>
            <div style={{ marginBottom:20, paddingBottom:12, borderBottom:`2px solid ${C.primary}` }}>

              <p style={{ margin:"4px 0 0", fontSize:12, color:C.slateLight }}>Top 10 — Actual vs Budget vs Last Year (AED)</p>
            </div>
            <ResponsiveContainer width="100%" height={340}>
              <BarChart data={barChartData} margin={{ top:10, right:10, left:0, bottom:60 }} barGap={2} barCategoryGap="20%">
                <defs>
                  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.primary} /><stop offset="100%" stopColor={C.accent} stopOpacity={0.85}/></linearGradient>
                  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#e2e8f0" /><stop offset="100%" stopColor="#cbd5e1" stopOpacity={0.7}/></linearGradient>
                  <linearGradient id="gL" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#a5b4fc" stopOpacity={0.9}/><stop offset="100%" stopColor="#818cf8" stopOpacity={0.6}/></linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" vertical={false} />
                <XAxis dataKey="name" tick={{ fontSize:10, fill:"#64748b" }} angle={-40} textAnchor="end" interval={0} height={75} axisLine={{ stroke:"#e2e8f0" }} tickLine={false} />
                <YAxis tick={{ fontSize:10, fill:"#94a3b8" }} tickFormatter={fmtK} axisLine={false} tickLine={false} />
                <Tooltip content={<ChartTooltip />} cursor={{ fill:"rgba(148,163,184,0.08)" }} />
                <Legend wrapperStyle={{ fontSize:11, paddingTop:8 }} iconType="circle" iconSize={8} />
                <Bar dataKey="This Year" fill="url(#gA)" radius={[5,5,0,0]} maxBarSize={32} />
                <Bar dataKey="Budget" fill="url(#gB)" radius={[5,5,0,0]} maxBarSize={32} />
                <Bar dataKey="Last Year" fill="url(#gL)" radius={[5,5,0,0]} maxBarSize={32} />
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* Variance Waterfall */}
          <div style={{ ...card, padding:28 }}>
            <div style={{ marginBottom:20, paddingBottom:12, borderBottom:`2px solid ${C.success}` }}>
              <h2 style={{ margin:0, fontSize:17, fontWeight:700, color:"#1e293b" }}>MTD Variance vs Budget</h2>
              <p style={{ margin:"4px 0 0", fontSize:12, color:C.slateLight }}>Green = over budget, Red = under budget (AED)</p>
            </div>
            <ResponsiveContainer width="100%" height={340}>
              <BarChart data={varianceData} margin={{ top:10, right:10, left:0, bottom:60 }} layout="vertical">
                <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" horizontal={false} />
                <XAxis type="number" tick={{ fontSize:10, fill:"#94a3b8" }} tickFormatter={fmtK} axisLine={false} tickLine={false} />
                <YAxis type="category" dataKey="name" tick={{ fontSize:11, fill:"#475569" }} width={100} axisLine={false} tickLine={false} />
                <Tooltip content={<ChartTooltip />} cursor={{ fill:"rgba(148,163,184,0.06)" }} />
                <Bar dataKey="variance" radius={[0,4,4,0]} maxBarSize={22} name="Variance (AED)">
                  {varianceData.map((e,i) => <Cell key={i} fill={e.fill} fillOpacity={0.85} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* PIE CHART */}
        <div style={{ ...card, padding:28, marginTop:20 }}>
          <div style={{ marginBottom:20, paddingBottom:12, borderBottom:`2px solid ${C.accent}` }}>
            <h2 style={{ margin:0, fontSize:17, fontWeight:700, color:"#1e293b" }}>YTD Revenue Composition</h2>
            <p style={{ margin:"4px 0 0", fontSize:12, color:C.slateLight }}>Share of total revenue by specialty</p>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:40 }}>
            <ResponsiveContainer width="50%" height={300}>
              <PieChart>
                <Pie data={pieData} cx="50%" cy="50%" innerRadius={70} outerRadius={120} paddingAngle={2} dataKey="value" stroke="none">
                  {pieData.map((e,i) => <Cell key={i} fill={e.fill} />)}
                </Pie>
                <Tooltip content={<PieTooltip />} />
              </PieChart>
            </ResponsiveContainer>
            <div style={{ flex:1, display:"grid", gridTemplateColumns:"1fr 1fr", gap:"6px 24px" }}>
              {pieData.map((s) => (
                <div key={s.name} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 0" }}>
                  <div style={{ width:10, height:10, borderRadius:3, background:s.fill, flexShrink:0 }} />
                  <span style={{ fontSize:12, color:"#475569", flex:1, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{s.name}</span>
                  <span style={{ fontSize:11, fontWeight:600, color:"#1e293b", fontVariantNumeric:"tabular-nums" }}>{(s.pctShare*100).toFixed(1)}%</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* SPECIALTY TABLE */}
        <div style={{ ...card, marginTop:24, overflow:"hidden" }}>
          <div style={{ padding:"18px 28px", borderBottom:"1px solid #e2e8f0" }}>
            <h3 style={{ margin:0, fontSize:16, fontWeight:700, color:"#1e293b" }}>Specialty Breakdown</h3>
            <p style={{ margin:"4px 0 0", fontSize:12, color:C.slateLight }}>Sorted by YTD Actual descending — red rows have negative YoY variance</p>
          </div>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", fontSize:13, whiteSpace:"nowrap" }}>
              <thead>
                <tr style={{ background:"#f8fafc" }}>
                  <th style={thS} rowSpan={2}>Specialty</th><th style={thS} rowSpan={2}>Today</th>
                  <th style={{ ...thS, textAlign:"center", borderBottom:"1px solid #e2e8f0" }} colSpan={5}>Month-to-Date (MTD)</th>
                  <th style={{ ...thS, textAlign:"center", borderBottom:"1px solid #e2e8f0" }} colSpan={5}>Year-to-Date (YTD)</th>
                </tr>
                <tr style={{ background:"#f8fafc" }}>
                  {["Actual","Budget","LY","vs Bgt","vs LY"].map(h=><th key={"m"+h} style={thSub}>{h}</th>)}
                  {["Actual","Budget","LY","vs Bgt","vs LY"].map(h=><th key={"y"+h} style={thSub}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {sorted.map((s,i) => (
                  <tr key={s.name} style={{ background: s.ytdVarLY<0 ? "#fef2f2" : i%2===0 ? "#fff" : "#fafbfc", borderBottom:"1px solid #f1f5f9" }}>
                    <td style={{ ...tdS, fontWeight:600, color:"#1e293b" }}>{s.name}</td>
                    <td style={tdN}>{fmt(s.today)}</td>
                    <td style={tdN}>{fmt(s.mtdActual)}</td><td style={{ ...tdN, color:"#94a3b8" }}>{fmt(s.mtdBudget)}</td><td style={{ ...tdN, color:"#94a3b8" }}>{fmt(s.mtdLY)}</td>
                    <td style={{ ...tdN, color:varColor(s.mtdVarBudget), fontWeight:600 }}>{pct(s.mtdVarBudget)}</td>
                    <td style={{ ...tdN, color:varColor(s.mtdVarLY), fontWeight:600 }}>{pct(s.mtdVarLY)}</td>
                    <td style={{ ...tdN, fontWeight:600 }}>{fmt(s.ytdActual)}</td><td style={{ ...tdN, color:"#94a3b8" }}>{fmt(s.ytdBudget)}</td><td style={{ ...tdN, color:"#94a3b8" }}>{fmt(s.ytdLY)}</td>
                    <td style={{ ...tdN, color:varColor(s.ytdVarBudget), fontWeight:600 }}>{pct(s.ytdVarBudget)}</td>
                    <td style={{ ...tdN, color:varColor(s.ytdVarLY), fontWeight:600 }}>{pct(s.ytdVarLY)}</td>
                  </tr>
                ))}
                <tr style={{ background:"#f0f7ff", borderTop:`2px solid ${C.primary}` }}>
                  <td style={{ ...tdS, fontWeight:800, color:C.primaryDark }}>GRAND TOTAL</td>
                  <td style={{ ...tdN, fontWeight:800, color:C.primaryDark }}>{fmt(totals.todayRev)}</td>
                  <td style={{ ...tdN, fontWeight:800, color:C.primaryDark }}>{fmt(totals.mtdActual)}</td><td style={{ ...tdN, fontWeight:700, color:"#94a3b8" }}>{fmt(totals.mtdBudget)}</td><td style={{ ...tdN, fontWeight:700, color:"#94a3b8" }}>{fmt(totals.mtdLY)}</td>
                  <td style={{ ...tdN, fontWeight:800, color:varColor(totals.mtdVarBudget) }}>{pct(totals.mtdVarBudget)}</td>
                  <td style={{ ...tdN, fontWeight:800, color:varColor(totals.mtdVarLY) }}>{pct(totals.mtdVarLY)}</td>
                  <td style={{ ...tdN, fontWeight:800, color:C.primaryDark }}>{fmt(totals.ytdActual)}</td><td style={{ ...tdN, fontWeight:700, color:"#94a3b8" }}>{fmt(totals.ytdBudget)}</td><td style={{ ...tdN, fontWeight:700, color:"#94a3b8" }}>{fmt(totals.ytdLY)}</td>
                  <td style={{ ...tdN, fontWeight:800, color:varColor(totals.ytdVarBudget) }}>{pct(totals.ytdVarBudget)}</td>
                  <td style={{ ...tdN, fontWeight:800, color:varColor(totals.ytdVarLY) }}>{pct(totals.ytdVarLY)}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        {/* DOCTOR PANELS */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginTop:24 }}>
          {/* Top Performers */}
          <div style={{ ...card, overflow:"hidden" }}>
            <div style={{ padding:"16px 24px", background:`linear-gradient(135deg, ${C.success}, ${C.successLight})`, display:"flex", alignItems:"center", gap:12 }}>

                  <tr key={d.name+i} style={{ background:i%2===0?"#fff":"#fffbeb", borderBottom:"1px solid #f1f5f9" }}>
                    <td style={{ ...dtd, fontWeight:600, color:"#1e293b" }}>{d.name}</td><td style={{ ...dtd, color:"#64748b" }}>{d.specialty}</td>
                    <td style={dtn}>{fmt(d.mtdActual)}</td><td style={{ ...dtn, color:"#94a3b8" }}>{fmt(d.mtdBudget)}</td>
                    <td style={dtn}><span style={{ color:"#fff", background:C.danger, padding:"2px 10px", borderRadius:6, fontWeight:700, fontSize:11 }}>{pct(d.mtdVarBudget)}</span></td>
                  </tr>
                ))}
                {!needsAttention.length && <tr><td colSpan={5} style={{ ...dtd, textAlign:"center", color:C.slateLight, padding:28 }}>All doctors within budget tolerance</td></tr>}
              </tbody>
            </table>
          </div>
        </div>

        {/* Bottom Performers */}
        <div style={{ ...card, marginTop:20, overflow:"hidden" }}>
          <div style={{ padding:"16px 24px", background:`linear-gradient(135deg, ${C.danger}, ${C.dangerLight})`, display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:32, height:32, borderRadius:8, background:"rgba(255,255,255,0.2)", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
            </div>
            <div><div style={{ fontWeight:700, fontSize:14, color:"#fff" }}>Bottom Performers</div><div style={{ fontSize:11, color:"rgba(255,255,255,0.75)" }}>Lowest YTD variance vs budget (Budget &gt; AED 50K)</div></div>
          </div>
          <table style={{ width:"100%", fontSize:12 }}>
            <thead><tr style={{ background:"#fef2f2" }}>
              <th style={dth}>#</th><th style={dth}>Doctor</th><th style={dth}>Specialty</th><th style={{ ...dth, textAlign:"right" }}>YTD Actual</th><th style={{ ...dth, textAlign:"right" }}>YTD Budget</th><th style={{ ...dth, textAlign:"right" }}>Variance</th>
            </tr></thead>
            <tbody>
              {bottomPerformers.map((d,i) => (
                <tr key={d.name+i} style={{ background:i%2===0?"#fff":"#fef2f2", borderBottom:"1px solid #f1f5f9" }}>
                  <td style={dtd}><span style={{ width:20, height:20, borderRadius:6, background:"#fef2f2", display:"inline-flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:10, color:C.danger }}>{i+1}</span></td>
                  <td style={{ ...dtd, fontWeight:600, color:"#1e293b" }}>{d.name}</td><td style={{ ...dtd, color:"#64748b" }}>{d.specialty}</td>
                  <td style={dtn}>{fmt(d.ytdActual)}</td><td style={{ ...dtn, color:"#94a3b8" }}>{fmt(d.ytdBudget)}</td>
                  <td style={dtn}><span style={{ color:"#fff", background:C.danger, padding:"2px 10px", borderRadius:6, fontWeight:700, fontSize:11 }}>{pct(d.ytdVarBudget)}</span></td>
                </tr>
              ))}
              {!bottomPerformers.length && <tr><td colSpan={6} style={{ ...dtd, textAlign:"center", color:C.slateLight, padding:28 }}>Upload data to populate</td></tr>}
            </tbody>
          </table>
        </div>

        <div style={{ textAlign:"center", padding:"28px 0 12px", color:C.slateLight, fontSize:11 }}>Al-Futtaim Health — HealthHub Executive Revenue Summary — All values in AED</div>
      </div>
    </div>
  );
}

try {
  ReactDOM.render(<App />, document.getElementById("root"));
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace;color:#dc2626"><h2>Render Error</h2><pre>'+e.message+'</pre><pre>'+e.stack+'</pre></div>';
}
</script>
</body>
</html>
