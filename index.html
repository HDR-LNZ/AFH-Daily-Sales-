function getDoctorProfileUrl(name) {
  const slug = getDoctorSlug(name);
  if (!slug) return null;
  // Direct match
  if (ACTIVE_DOCTOR_SLUGS.has(slug)) return HEALTHHUB_DOCTOR_URL + slug + "/";
  // Alias match
  if (DOCTOR_SLUG_ALIASES[slug]) return HEALTHHUB_DOCTOR_URL + DOCTOR_SLUG_ALIASES[slug] + "/";
  // Fuzzy: try matching on last name + first name prefix
  const parts = slug.split('-').filter(p => p && p !== 'dr');
  if (parts.length >= 1) {
    const last = parts[parts.length - 1];
    const first = parts[0];
    for (const s of ACTIVE_DOCTOR_SLUGS) {
      const sp = s.split('-').filter(p => p && p !== 'dr' && p !== 'prof');
      if (sp.length >= 2 && sp[sp.length - 1] === last && sp[0] === first) return HEALTHHUB_DOCTOR_URL + s + "/";
    }
  }
  return null;
}

function parseExcelFile(data) {
  const wb = XLSX.read(data, { type: "array" });
  const ssName = wb.SheetNames.find((n) => n.toLowerCase().includes("specialty"));
  if (!ssName) throw new Error("Sheet not found");
  const ws = wb.Sheets[ssName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  let headerIdx = 4;
  for (let i = 0; i < 10; i++) { const r = rows[i] || []; if (r.join(" ").toLowerCase().match(/specialty|doctor/)) { headerIdx = i; break; } }
  const num = (v) => (typeof v === "number" ? v : parseFloat(v) || 0);
  const specialties = [], doctors = [];
  for (let i = headerIdx + 2; i < rows.length; i++) {
    const r = rows[i]; if (!r) continue;
    const colA = r[0], colB = r[1];
    if (!colB || typeof colB !== "string" || colB.toLowerCase().includes("grand total")) continue;
    const colBL = colB.toLowerCase();
    if (colBL.includes("lutetia") || colBL.includes("not required")) continue;
    const today=num(r[2]),mtdBudget=num(r[3]),mtdActual=num(r[4]),mtdLY=num(r[5]),mtdVBR=num(r[6]),mtdVLR=num(r[7]),ytdBudget=num(r[8]),ytdActual=num(r[9]),ytdLY=num(r[10]);
    if (colB.includes("Total")) {
      const name = colB.replace(/\s*Total\s*/i,"").trim(); if (!name) continue;
      specialties.push({ name, today, mtdActual, mtdBudget, mtdLY, mtdVarBudget: mtdBudget ? mtdVBR||(mtdActual-mtdBudget)/mtdBudget : 0, mtdVarLY: mtdLY ? mtdVLR||(mtdActual-mtdLY)/mtdLY : 0, ytdActual, ytdBudget, ytdLY, ytdVarBudget: ytdBudget ? (ytdActual-ytdBudget)/ytdBudget : 0, ytdVarLY: ytdLY ? (ytdActual-ytdLY)/ytdLY : 0 });
    } else if (colA && typeof colA === "string" && colA.trim()) {
      doctors.push({ name: colA.trim(), specialty: colB.trim(), today, mtdActual, mtdBudget, mtdLY, ytdActual, ytdBudget, ytdLY, mtdVarBudget: mtdBudget ? (mtdActual-mtdBudget)/mtdBudget : 0, ytdVarBudget: ytdBudget ? (ytdActual-ytdBudget)/ytdBudget : 0, mtdVarLY: mtdLY ? (mtdActual-mtdLY)/mtdLY : 0, ytdVarLY: ytdLY ? (ytdActual-ytdLY)/ytdLY : 0 });
    }
  }
  // Compute Today per specialty from doctor data
  const specTodayMap = {};
  doctors.forEach(d => {
    if (!specTodayMap[d.specialty]) specTodayMap[d.specialty] = 0;
    specTodayMap[d.specialty] += d.today;
  });
  specialties.forEach(s => { s.today = specTodayMap[s.name] || s.today || 0; });

  let reportDate = DEFAULT_REPORT_DATE;
  let dsrTotals = null;
  const dsrName = wb.SheetNames.find((n) => n.toUpperCase().includes("DSR"));
  if (dsrName) {
    const dsRows = XLSX.utils.sheet_to_json(wb.Sheets[dsrName], { header:1, defval:null });
    // Report date from DSR R7 C8 (0-indexed: row 6, col 7) or R7 C3 (row 6, col 2)
    const dateCell = dsRows[6] && (dsRows[6][7] || dsRows[6][2]);
    if (dateCell instanceof Date) { reportDate = dateCell.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }); }
    else if (typeof dateCell === "number" && dateCell > 40000) { const d = new Date((dateCell - 25569) * 86400000); reportDate = d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }); }
    else { for (let i=0;i<10;i++) { const r=dsRows[i]; if(!r) continue; for (const cell of r) { if (cell instanceof Date) { reportDate=cell.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); break; } } } }
    const numK = (r, c) => { const v = dsRows[r] && dsRows[r][c]; return typeof v === 'number' ? Math.round(v * 1000) : 0; };
    const specMtdActual = specialties.reduce((a,s) => a + s.mtdActual, 0) || 1;
    const specMtdBudget = specialties.reduce((a,s) => a + s.mtdBudget, 0);
    const specMtdLY = specialties.reduce((a,s) => a + s.mtdLY, 0);
    const dsrMtdActual = numK(10, 7);
    const scaleFactor = dsrMtdActual / specMtdActual;
    dsrTotals = {
      todayRev: numK(9, 7),
      mtdActual: dsrMtdActual,
      mtdBudget: Math.round(specMtdBudget * scaleFactor),
      mtdLY: Math.round(specMtdLY * scaleFactor),
      ytdActual: numK(10, 19),
      ytdLY: numK(10, 20),
      ytdBudget: numK(10, 22),
    };
    dsrTotals.daysElapsed = (dsRows[11] && typeof dsRows[11][3] === 'number') ? dsRows[11][3] : 6;
    // IP MTD from DSR R48 C15 (raw AED, not x1000) for cross-validation
    dsrTotals.dsrIpMTD = Math.round(dsRows[47] && typeof dsRows[47][14] === 'number' ? dsRows[47][14] : 0);
    dsrTotals.dsrIpVol = Math.round(dsRows[75] && typeof dsRows[75][14] === 'number' ? dsRows[75][14] : 0);
    // OP volume and PPC from DSR R76
    const rawNum = (r, c) => { const v = dsRows[r] && dsRows[r][c]; return typeof v === 'number' ? Math.round(v) : 0; };
    const opMtdVol = rawNum(75, 12); // R76 C13 (0-indexed: row 75, col 12)
    const opMtdRev = specialties.reduce((a,s) => a + s.mtdActual, 0);
    const opMtdLYRev = specialties.reduce((a,s) => a + s.mtdLY, 0);
    dsrTotals.opMtdVolume = opMtdVol;
    dsrTotals.opMtdRevenue = opMtdRev;
    dsrTotals.opMtdPPC = 0; // computed in App using (DSR total - IP) / OP volume
    dsrTotals.opMtdLYRevenue = opMtdLYRev;
    // Estimate LY volume from YTD ratio
    const ytdVol = rawNum(7, 13); // R8 C14 = YTD volume
    const ytdVolLY = rawNum(7, 14); // R8 C15 = YTD volume LY
    const volRatio = ytdVol && ytdVolLY ? ytdVolLY / ytdVol : 1;
    const opMtdLYVol = Math.round(opMtdVol * volRatio);
    dsrTotals.opMtdLYVolume = opMtdLYVol;
    dsrTotals.opMtdLYPPC = opMtdLYVol ? Math.round(opMtdLYRev / opMtdLYVol) : 0;
  }
  let locations = null;
  const locSheetName = wb.SheetNames.find((n) => n.toLowerCase().includes("location"));
  if (locSheetName) {
    const locWs = wb.Sheets[locSheetName];
    const locRows = XLSX.utils.sheet_to_json(locWs, { header: 1, defval: null });
    const rawLocs = [];
    for (let i = 6; i < locRows.length; i++) {
      const r = locRows[i]; if (!r) continue;
      const loc = r[1], doc = r[2], spec = r[3];
      if (!loc || typeof loc !== "string" || loc.toLowerCase().includes("total") || loc.toLowerCase().includes("grand")) continue;
      if (!doc || typeof doc !== "string" || !doc.trim()) continue;
      rawLocs.push({ location: loc.trim(), doctor: doc.trim(), specialty: (spec && typeof spec === "string") ? spec.trim() : "Other", today: num(r[5]), mtdBudget: num(r[6]), mtdActual: num(r[7]), ytdBudget: num(r[10]), ytdActual: num(r[11]) });
    }
    locations = aggregateLocationData(rawLocs);
    // Enrich locations with DSR-level totals (OP + Pharmacy + IP) from DSR rows 26-43
    if (dsrName) {
      const dsRows2 = XLSX.utils.sheet_to_json(wb.Sheets[dsrName], { header: 1, defval: null });
      const dsrClinicMap = {};
      for (let i = 25; i < 50; i++) {
        const r = dsRows2[i]; if (!r) continue;
        const code = r[2]; // C3 = clinic code (Qusais, Silicon, DSU, etc.)
        if (!code || typeof code !== "string") continue;
        const loc = code.trim();
        dsrClinicMap[loc] = {
          totalToday: Math.round(r[10] || 0),    // C11 = Today total
          totalRevenueMTD: Math.round(r[15] || 0), // C16 = MTD total
          mtdLY: Math.round(r[20] || 0),           // C21 = MTD LY total
          mtdBudget: Math.round(r[30] || 0),       // C31 = Budget MTD total
          totalRevenueYTD: Math.round(r[40] || 0), // C41 = YTD total
          ytdLY: Math.round(r[45] || 0),           // C46 = YTD LY total
        };
      }
      // Also extract PPC per clinic from DSR PPC section (rows 82-93, offset +56 from revenue rows)
      const dsrPPCMap = {};
      for (let i = 81; i < 100; i++) {
        const r = dsRows2[i]; if (!r) continue;
        const name = r[6]; // C7 = clinic name
        if (!name || typeof name !== "string") continue;
        // Find matching clinic code from revenue section
        for (const [code, data] of Object.entries(dsrClinicMap)) {
          const label = CLINIC_COORDS[code]?.label || code;
          if (name.includes(label) || label.includes(name.trim().split(' ')[0])) {
            dsrPPCMap[code] = { ppcYTD: Math.round(r[40] || 0), ppcYTDLY: Math.round(r[45] || 0) };
          }
        }
      }
      // Extract OP volume per clinic from DSR volume section (rows 54-65, offset +28 from revenue)
      const dsrVolMap = {};
      for (let i = 53; i < 72; i++) {
        const r = dsRows2[i]; if (!r) continue;
        const name = r[6];
        if (!name || typeof name !== "string") continue;
        for (const [code, data] of Object.entries(dsrClinicMap)) {
          const label = CLINIC_COORDS[code]?.label || code;
          if (name.includes(label) || label.includes(name.trim().split(' ')[0])) {
            dsrVolMap[code] = { opVolMTD: Math.round(r[12] || 0), opVolMTDLY: Math.round(r[17] || 0) };
          }
        }
      }
      locations.forEach(loc => {
        const dsr = dsrClinicMap[loc.location];
        if (dsr) {
          loc.totalToday = dsr.totalToday;
          loc.totalRevenueMTD = dsr.totalRevenueMTD;
          loc.mtdLY = dsr.mtdLY;
          loc.mtdBudget = dsr.mtdBudget;
          loc.totalRevenueYTD = dsr.totalRevenueYTD;
          loc.ytdLY = dsr.ytdLY;
        }
        const ppc = dsrPPCMap[loc.location];
        if (ppc) { loc.ppcYTD = ppc.ppcYTD; loc.ppcYTDLY = ppc.ppcYTDLY; }
        const vol = dsrVolMap[loc.location];
        if (vol) { loc.opVolMTD = vol.opVolMTD; loc.opVolMTDLY = vol.opVolMTDLY; }
      });
      locations.sort((a, b) => b.totalRevenueMTD - a.totalRevenueMTD);
    }
  }

  // Parse IP Analysis
  let ipSpecialties = null;
  const ipAnalysisName = wb.SheetNames.find(n => n.toLowerCase().includes("ip analysis"));
  if (ipAnalysisName) {
    const ipWs = wb.Sheets[ipAnalysisName];
    const ipRows = XLSX.utils.sheet_to_json(ipWs, { header: 1, defval: null });
    ipSpecialties = [];
    // Find header row to determine column layout
    let ipNameCol = 1, ipRevLYCol = 2, ipRevCol = 3, ipBgtCol = 4, ipVolLYCol = 8, ipVolCol = 9;
    for (let i = 0; i < Math.min(6, ipRows.length); i++) {
      const r = ipRows[i]; if (!r) continue;
      // Check if this row has "Specialty" — indicates header
      for (let c = 0; c < 5; c++) {
        if (r[c] && typeof r[c] === "string" && r[c].toLowerCase().includes("specialty")) {
          ipNameCol = c; break;
        }
      }
      // Check for "Last Year" header to find revenue columns
      for (let c = 0; c < 10; c++) {
        if (r[c] && typeof r[c] === "string" && r[c] === "Last Year") { ipRevLYCol = c; ipRevCol = c + 1; ipBgtCol = c + 2; break; }
      }
    }
    // Find volume columns (second group of "Last Year", "Current")
    for (let i = 0; i < Math.min(6, ipRows.length); i++) {
      const r = ipRows[i]; if (!r) continue;
      let foundFirst = false;
      for (let c = 0; c < 20; c++) {
        if (r[c] && typeof r[c] === "string" && r[c] === "Last Year") {
          if (foundFirst) { ipVolLYCol = c; ipVolCol = c + 1; break; }
          foundFirst = true;
        }
      }
    }
    console.log("IP columns: name=" + ipNameCol + " revLY=" + ipRevLYCol + " rev=" + ipRevCol + " bgt=" + ipBgtCol + " volLY=" + ipVolLYCol + " vol=" + ipVolCol);
    for (let i = 4; i < 20; i++) {
      const r = ipRows[i]; if (!r) continue;
      const name = r[ipNameCol]; if (!name || typeof name !== "string") continue;
      const nameLower = name.trim().toLowerCase();
      if (nameLower === "total" || nameLower === "specialty" || nameLower.includes("revenue") || nameLower.includes("volume") || nameLower.includes("ppc")) continue;
      const mtdActual = num(r[ipRevCol]), mtdLY = num(r[ipRevLYCol]), mtdBudget = num(r[ipBgtCol]);
      const mtdVolLY = Math.round(num(r[ipVolLYCol]) || 0);
      const mtdVolume = Math.round(num(r[ipVolCol]) || 0);
      if (mtdActual === 0 && mtdLY === 0 && mtdVolume === 0) continue;
      ipSpecialties.push({ name: name.trim(), mtdActual, mtdLY, mtdBudget, mtdVolume, mtdVolLY });
    }
    // Parse YTD (rows 18-31) — use same column layout as MTD
    const ytdMap = {};
    for (let i = 17; i < 35; i++) {
      const r = ipRows[i]; if (!r) continue;
      const name = r[ipNameCol]; if (!name || typeof name !== "string") continue;
      const nl = name.trim().toLowerCase();
      if (nl === "total" || nl === "specialty" || nl.includes("revenue") || nl.includes("volume") || nl.includes("ppc")) continue;
      ytdMap[name.trim()] = { ytdActual: num(r[ipRevCol]), ytdLY: num(r[ipRevLYCol]), ytdBudget: num(r[ipBgtCol]), ytdVolume: Math.round(num(r[ipVolCol]) || 0), ytdVolLY: Math.round(num(r[ipVolLYCol]) || 0) };
    }
    ipSpecialties.forEach(s => {
      const ytd = ytdMap[s.name];
      if (ytd) Object.assign(s, ytd);
    });
  }

  // Parse IP Dr Wise Daily
  let ipDoctors = null;
  const ipDrName = wb.SheetNames.find(n => n.toLowerCase().includes("ip dr"));
  if (ipDrName) {
    const ipDrWs = wb.Sheets[ipDrName];
    const ipDrRows = XLSX.utils.sheet_to_json(ipDrWs, { header: 1, defval: null });
    ipDoctors = [];
    for (let i = 5; i < ipDrRows.length; i++) {
      const r = ipDrRows[i]; if (!r) continue;
      const name = r[0], spec = r[1], rev = num(r[2]), count = num(r[3]);
      if (!name || typeof name !== "string" || !name.trim()) continue;
      if (rev === 0 && count === 0) continue;
      ipDoctors.push({ name: name.trim(), specialty: spec?.trim() || "Other", mtdRevenue: rev, mtdCount: count });
    }
    ipDoctors.sort((a, b) => b.mtdRevenue - a.mtdRevenue);
  }

  // Parse daily revenue from "OP Dr Wise Daily" sheet
  let dailyRevenue = [];
  const opDrName = wb.SheetNames.find(n => n.toLowerCase().includes("op dr"));
  if (opDrName) {
    const opWs = wb.Sheets[opDrName];
    const opRows = XLSX.utils.sheet_to_json(opWs, { header: 1, defval: null });
    for (let day = 1; day <= 31; day++) {
      const col = 5 + (day - 1) * 3;
      const volCol = col + 1;
      let total = 0, volume = 0, hasData = false;
      for (let i = 5; i < opRows.length; i++) {
        const name = opRows[i] && opRows[i][0];
        if (!name || typeof name !== 'string' || !name.trim()) continue;
        const v = opRows[i][col];
        if (typeof v === 'number' && v !== 0) { total += v; hasData = true; }
        const vc = opRows[i][volCol];
        if (typeof vc === 'number' && vc !== 0) { volume += vc; }
      }
      if (!hasData || total === 0) break;
      dailyRevenue.push({ day, total: Math.round(total), volume: Math.round(volume) });
    }
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    dailyRevenue = dailyRevenue.map((d, i) => {
      const date = new Date(2026, 3, d.day); // April = month 3
      const dow = dayNames[date.getDay()];
      return { ...d, label: dow + ' ' + d.day, fullLabel: dow + ', Apr ' + d.day };
    });
  }

  // Build doctor locations map from Location sheet
  const doctorLocations = {};
  if (locations) {
    locations.forEach(loc => {
      loc.specialties.forEach(spec => {
        spec.doctors.forEach(doc => {
          if (!doctorLocations[doc.name]) doctorLocations[doc.name] = [];
          if (!doctorLocations[doc.name].includes(loc.location)) doctorLocations[doc.name].push(loc.location);
        });
      });
    });
  }
  // Enrich doctors with location data
  doctors.forEach(d => {
    const locs = doctorLocations[d.name];
    if (locs && locs.length) d.locations = locs.join(',');
    else d.locations = DEFAULT_DOCTOR_LOCATIONS[d.name] || '';
  });

  return { specialties, doctors, reportDate, locations, dsrTotals, ipSpecialties, ipDoctors, dailyRevenue, doctorLocations };
}

function aggregateLocationData(rawRows) {
  const map = {};
  for (const r of rawRows) {
    if (!map[r.location]) map[r.location] = {};
    if (!map[r.location][r.specialty]) map[r.location][r.specialty] = [];
    map[r.location][r.specialty].push(r);
  }
  return Object.keys(map).map((loc) => {
    const specEntries = Object.keys(map[loc]).map((specName) => {
      const docs = map[loc][specName];
      return {
        name: specName,
        today: docs.reduce((a, d) => a + d.today, 0),
        mtdActual: docs.reduce((a, d) => a + d.mtdActual, 0),
        mtdBudget: docs.reduce((a, d) => a + d.mtdBudget, 0),
        mtdLY: docs.reduce((a, d) => a + (d.mtdLY || 0), 0) || undefined,
        ytdActual: docs.reduce((a, d) => a + d.ytdActual, 0),
        ytdBudget: docs.reduce((a, d) => a + d.ytdBudget, 0),
        ytdLY: docs.reduce((a, d) => a + (d.ytdLY || 0), 0) || undefined,
        doctors: docs.map((d) => ({ name: d.doctor, today: d.today, mtdActual: d.mtdActual, mtdBudget: d.mtdBudget, mtdLY: d.mtdLY, ytdActual: d.ytdActual, ytdBudget: d.ytdBudget, ytdLY: d.ytdLY })),
      };
    }).sort((a, b) => b.mtdActual - a.mtdActual);
    const hasMtdLY = specEntries.some(s => s.mtdLY);
    const hasYtdLY = specEntries.some(s => s.ytdLY);
    return {
      location: loc,
      totalToday: specEntries.reduce((a, s) => a + s.today, 0),
      totalRevenueMTD: specEntries.reduce((a, s) => a + s.mtdActual, 0),
      mtdBudget: specEntries.reduce((a, s) => a + s.mtdBudget, 0),
      mtdLY: hasMtdLY ? specEntries.reduce((a, s) => a + (s.mtdLY || 0), 0) : undefined,
      totalRevenueYTD: specEntries.reduce((a, s) => a + s.ytdActual, 0),
      ytdBudget: specEntries.reduce((a, s) => a + s.ytdBudget, 0),
      ytdLY: hasYtdLY ? specEntries.reduce((a, s) => a + (s.ytdLY || 0), 0) : undefined,
      specialties: specEntries,
    };
  }).sort((a, b) => b.totalRevenueMTD - a.totalRevenueMTD);
}

function validateData(parsed) {
  const warnings = [];
  const { specialties, doctors, dsrTotals, locations } = parsed;

  if (!dsrTotals) {
    warnings.push("DSR sheet not found — KPI totals may be incorrect");
    return warnings;
  }

  // 1. DSR MTD must be > 0
  if (!dsrTotals.mtdActual || dsrTotals.mtdActual <= 0) {
    warnings.push("MTD Revenue is zero or missing from DSR sheet");
  }

  // 2. DSR MTD should be > Specialty OP total (DSR includes Pharmacy+IP)
  const opMtd = specialties.reduce((a,s) => a + s.mtdActual, 0);
  if (dsrTotals.mtdActual && opMtd > dsrTotals.mtdActual) {
    warnings.push("OP specialty total (" + fmt(opMtd) + ") exceeds DSR total (" + fmt(dsrTotals.mtdActual) + ") — possible cell mapping error");
  }

  // 3. DSR/OP ratio should be 1.3-2.0x (OP is ~55-75% of total revenue)
  if (dsrTotals.mtdActual && opMtd > 0) {
    const ratio = dsrTotals.mtdActual / opMtd;
    if (ratio < 1.1 || ratio > 2.5) {
      warnings.push("DSR/OP ratio is " + ratio.toFixed(2) + "x (expected 1.3-2.0x) — check cell references");
    }
  }

  // 4. YTD should be >= MTD
  if (dsrTotals.ytdActual && dsrTotals.mtdActual && dsrTotals.ytdActual < dsrTotals.mtdActual) {
    warnings.push("YTD (" + fmt(dsrTotals.ytdActual) + ") is less than MTD (" + fmt(dsrTotals.mtdActual) + ")");
  }

  // 5. Today should be <= MTD
  if (dsrTotals.todayRev && dsrTotals.mtdActual && dsrTotals.todayRev > dsrTotals.mtdActual) {
    warnings.push("Today's revenue (" + fmt(dsrTotals.todayRev) + ") exceeds MTD (" + fmt(dsrTotals.mtdActual) + ")");
  }

  // 6. Days elapsed should be reasonable (1-31)
  if (dsrTotals.daysElapsed && (dsrTotals.daysElapsed < 1 || dsrTotals.daysElapsed > 31)) {
    warnings.push("Days elapsed (" + dsrTotals.daysElapsed + ") is out of range");
  }

  // 7. Location totals should be close to DSR clinic total (not exceed it)
  if (locations && locations.length > 0) {
    const locTotal = locations.reduce((a,l) => a + l.totalRevenueMTD, 0);
    if (dsrTotals.mtdActual && locTotal > dsrTotals.mtdActual * 1.1) {
      warnings.push("Location total (" + fmt(locTotal) + ") exceeds DSR total — possible double-counting");
    }
  }

  // 8. No negative revenues for major metrics
  if (dsrTotals.todayRev < 0) warnings.push("Today's revenue is negative");
  if (dsrTotals.mtdActual < 0) warnings.push("MTD revenue is negative");
  if (dsrTotals.ytdActual < 0) warnings.push("YTD revenue is negative");

  // 9. IP validation
  if (parsed.ipSpecialties && parsed.ipSpecialties.length > 0) {
    const ipTotal = parsed.ipSpecialties.reduce((a,s) => a + s.mtdActual, 0);
    const ipVol = parsed.ipSpecialties.reduce((a,s) => a + (s.mtdVolume||0), 0);

    // IP revenue should be < DSR total (IP is a fraction of total)
    if (dsrTotals.mtdActual && ipTotal > dsrTotals.mtdActual * 0.5) {
      warnings.push("IP revenue (" + fmt(ipTotal) + ") is >50% of DSR total (" + fmt(dsrTotals.mtdActual) + ") — check IP parsing");
    }

    // IP + OP should ≈ DSR total (within 5% margin for Pharmacy/Corporate)
    const opPlusIP = opMtd + ipTotal;
    if (dsrTotals.mtdActual && opPlusIP > dsrTotals.mtdActual) {
      warnings.push("OP (" + fmt(opMtd) + ") + IP (" + fmt(ipTotal) + ") = " + fmt(opPlusIP) + " exceeds DSR total (" + fmt(dsrTotals.mtdActual) + ")");
    }

    // IP PPC sanity: should be 3000-20000 per case
    if (ipVol > 0) {
      const ipPPC = ipTotal / ipVol;
      if (ipPPC < 1000 || ipPPC > 25000) {
        warnings.push("IP PPC is AED " + fmt(Math.round(ipPPC)) + " (" + ipVol + " cases) — outside expected range 3K-20K");
      }
    }

    // IP volume should be reasonable (1-500 per month)
    if (ipVol > 500) {
      warnings.push("IP volume (" + ipVol + " cases) seems too high");
    }

    // Cross-check: IP Analysis total should match DSR IP MTD (R48 C15)
    if (dsrTotals.dsrIpMTD > 0) {
      const diff = Math.abs(ipTotal - dsrTotals.dsrIpMTD);
      if (diff > dsrTotals.dsrIpMTD * 0.05) {
        warnings.push("IP Analysis total (" + fmt(ipTotal) + ") doesn't match DSR IP (" + fmt(dsrTotals.dsrIpMTD) + ") — diff: " + fmt(diff));
      }
    }
    // Cross-check: IP volume should match DSR volume (R76 C15)
    if (dsrTotals.dsrIpVol > 0 && ipVol !== dsrTotals.dsrIpVol) {
      warnings.push("IP Analysis cases (" + ipVol + ") doesn't match DSR IP volume (" + dsrTotals.dsrIpVol + ")");
    }
  }

  // 10. Doctor count sanity
  if (doctors.length < 10) {
    warnings.push("Only " + doctors.length + " doctors parsed — expected 200+");
  }

  // 11. Daily revenue: days with data should match daysElapsed
  if (parsed.dailyRevenue && dsrTotals.daysElapsed) {
    const daysWithRev = parsed.dailyRevenue.filter(d => d.total > 0).length;
    if (daysWithRev > dsrTotals.daysElapsed + 1) {
      warnings.push("Daily revenue has " + daysWithRev + " days but DSR shows " + dsrTotals.daysElapsed + " days elapsed");
    }
    // Check for zero-revenue days mixed in with real days
    const zeroMidstream = parsed.dailyRevenue.findIndex((d, i) => d.total === 0 && i < parsed.dailyRevenue.length - 1 && parsed.dailyRevenue[i+1].total > 0);
    if (zeroMidstream >= 0) {
      warnings.push("Zero-revenue day found at day " + (zeroMidstream+1) + " with non-zero days after — possible parsing error");
    }
  }

  return warnings;
}

// ─── Custom Tooltips ─────────────────────────────────────────────────────────

function ChartTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  const accentColor = payload[0]?.color || C.primary;
  return (
    <div style={{ background:"#1e293b", borderRadius:10, padding:"14px 18px", boxShadow:"0 8px 30px rgba(0,0,0,0.4)", border:"1px solid #2f3548", borderLeft:"3px solid " + accentColor }}>
      <div style={{ fontWeight:700, fontSize:13, color:"#e2e8f0", marginBottom:8, borderBottom:"1px solid #2f3548", paddingBottom:6 }}>{label}</div>
      {payload.map((p,i) => (
        <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"3px 0" }}>
          <div style={{ width:10, height:10, borderRadius:3, background:p.color }} />
          <span style={{ fontSize:12, color:"#94a3b8", flex:1 }}>{p.name}</span>
          <span style={{ fontSize:13, fontWeight:600, color:"#e2e8f0", fontVariantNumeric:"tabular-nums" }}>AED {fmt(p.value)}</span>
        </div>
      ))}
    </div>
  );
}

function PieTooltip({ active, payload }) {
  if (!active || !payload?.length) return null;
  const d = payload[0];
  return (
    <div style={{ background:"#1e293b", borderRadius:10, padding:"12px 16px", boxShadow:"0 8px 30px rgba(0,0,0,0.4)", border:"1px solid #2f3548", borderLeft:"3px solid " + (d.payload?.fill || C.primary) }}>
      <div style={{ fontWeight:700, fontSize:13, color:"#e2e8f0", marginBottom:4 }}>{d.name}</div>
      <div style={{ fontSize:13, color:"#94a3b8" }}>AED {fmt(d.value)} ({(d.payload.pctShare*100).toFixed(1)}%)</div>
    </div>
  );
}

// ─── Budget Gauge ────────────────────────────────────────────────────────────

function BudgetGauge({ label, actual, comparison, size = 120 }) {
  const pctVal = comparison ? actual / comparison : 0;
  const capped = Math.min(pctVal, 1.2);
  const color = pctVal >= 1 ? C.success : pctVal >= 0.9 ? C.warning : C.danger;
  const data = [{ name: label, value: capped * 100, fill: color }];
  return (
    <div style={{ textAlign: "center" }}>
      <ResponsiveContainer width={size} height={size}>
        <RadialBarChart cx="50%" cy="50%" innerRadius="70%" outerRadius="100%" startAngle={210} endAngle={-30} data={data} barSize={10}>
          <RadialBar background={{ fill:"#2f3548" }} dataKey="value" cornerRadius={8} />
        </RadialBarChart>
      </ResponsiveContainer>
      <div style={{ marginTop: -size * 0.45, position: "relative", zIndex: 1 }}>
        <div style={{ fontSize: 20, fontWeight: 800, color, letterSpacing: "-0.02em" }}>{(pctVal*100).toFixed(0)}%</div>
        <div style={{ fontSize: 10, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 600, marginTop: 2 }}>{label}</div>
      </div>
      <div style={{ height: size * 0.15 }} />
    </div>
  );
}

// ─── Upload Zone ─────────────────────────────────────────────────────────────

function UploadZone({ onFileLoaded, compact }) {
  const [isDrag, setIsDrag] = useState(false);
  const [status, setStatus] = useState(null);
  const inputRef = useRef(null);
  const processFile = useCallback((file) => {
    if (!file) return; setStatus("loading");
    const reader = new FileReader();
    reader.onload = (e) => {
      try { const parsed = parseExcelFile(new Uint8Array(e.target.result)); if (!parsed.specialties.length) { setStatus("error"); return; } onFileLoaded(parsed); setStatus("success"); setTimeout(() => setStatus(null), 3000); }
      catch(err) { console.error(err); setStatus("error"); setTimeout(() => setStatus(null), 4000); }
    };
    reader.readAsArrayBuffer(file);
  }, [onFileLoaded]);

  if (compact) {
    return (
      <div onDragOver={(e)=>{e.preventDefault();setIsDrag(true);}} onDragLeave={()=>setIsDrag(false)} onDrop={(e)=>{e.preventDefault();setIsDrag(false);processFile(e.dataTransfer.files[0]);}} onClick={()=>inputRef.current?.click()}
        style={{ border:`1px dashed ${isDrag ? C.primary : C.border}`, borderRadius:8, padding:"10px 12px", background: isDrag ? "rgba(59,130,246,0.08)" : "transparent", transition:"all 0.25s", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
        <input ref={inputRef} type="file" accept=".xlsx,.xls" style={{ display:"none" }} onChange={(e)=>processFile(e.target.files[0])} />
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={isDrag ? C.primary : C.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span style={{ fontWeight:600, color: isDrag ? C.primary : C.textSecondary, fontSize:12 }}>Upload</span>
        {status==="loading" && <div style={{ width:14, height:14, border:"2px solid "+C.border, borderTopColor:C.primary, borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />}
        {status==="success" && <span style={{ color:C.success, fontSize:11, fontWeight:700 }}>OK</span>}
        {status==="error" && <span style={{ color:C.danger, fontSize:11, fontWeight:700 }}>Err</span>}
      </div>
    );
  }

  return (
    <div onDragOver={(e)=>{e.preventDefault();setIsDrag(true);}} onDragLeave={()=>setIsDrag(false)} onDrop={(e)=>{e.preventDefault();setIsDrag(false);processFile(e.dataTransfer.files[0]);}} onClick={()=>inputRef.current?.click()}
      style={{ border:`2px dashed ${isDrag ? C.primary : C.border}`, borderRadius:14, padding:"14px 28px", background: isDrag ? "rgba(59,130,246,0.08)" : C.cardBg, transition:"all 0.25s", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:14 }}>
      <input ref={inputRef} type="file" accept=".xlsx,.xls" style={{ display:"none" }} onChange={(e)=>processFile(e.target.files[0])} />
      <div style={{ width:40, height:40, borderRadius:10, background:"rgba(59,130,246,0.1)", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={isDrag ? C.primary : C.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <div><span style={{ fontWeight:700, color:C.primary, fontSize:14 }}>Upload New Report</span><span style={{ color:C.textMuted, fontSize:13, marginLeft:8 }}>Drag & drop .xlsx or click</span></div>
      {status==="loading" && <div style={{ width:18, height:18, border:"2px solid "+C.border, borderTopColor:C.primary, borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />}

      {status==="error" && <span style={{ color:C.danger, fontSize:13, fontWeight:700 }}>Parse error</span>}

}

// ─── Dubai Map Component ────────────────────────────────────────────────────

function DubaiMap({ locations, onClinicClick, isMobile }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markersRef = useRef([]);
  const { useEffect } = React;

  const displayLocations = locations.filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location));

  useEffect(() => {
    if (mapInstanceRef.current) {
      markersRef.current.forEach(m => m.remove());
      markersRef.current = [];
    } else {
      const map = L.map(mapRef.current, {
        center: [25.15, 55.25],
        zoom: 11,
        zoomControl: true,
        attributionControl: false,
        doubleClickZoom: false,
      });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
      }).addTo(map);
      mapInstanceRef.current = map;
    }

    const map = mapInstanceRef.current;
    const revs = displayLocations.map(l => l.totalRevenueMTD || 0);
    const maxRev = Math.max(...revs, 1);
    const minRev = Math.min(...revs, 0);
    const range = maxRev - minRev || 1;

    displayLocations.forEach((loc) => {
      const coords = CLINIC_COORDS[loc.location];
      if (!coords) return;

      const t = (loc.totalRevenueMTD - minRev) / range;
      const radius = 8 + t * 22;
      const color = '#3b82f6';
      const mtdLY = loc.mtdLY || 0;
      const lyVar = mtdLY ? (loc.totalRevenueMTD - mtdLY) / mtdLY : null;
      const budgetVar = loc.mtdBudget ? (loc.totalRevenueMTD - loc.mtdBudget) / loc.mtdBudget : null;

      const circle = L.circleMarker([coords.lat, coords.lng], {
        radius: radius,
        fillColor: color,
        color: '#60a5fa',
        weight: 2,
        opacity: 0.9,
        fillOpacity: 0.65,
      }).addTo(map);

      const varLine = lyVar !== null
        ? '<span style="color:' + (lyVar >= 0 ? '#34d399' : '#f87171') + '">vs LY: ' + (lyVar >= 0 ? '+' : '') + (lyVar * 100).toFixed(1) + '%</span>'
        : (budgetVar !== null ? '<span style="color:' + (budgetVar >= 0 ? '#34d399' : '#f87171') + '">vs Budget: ' + (budgetVar >= 0 ? '+' : '') + (budgetVar * 100).toFixed(1) + '%</span>' : '');

      circle.bindPopup(
        '<div style="font-family:Inter,sans-serif;font-size:12px;min-width:140px">' +
        (coords.url
          ? '<a href="' + coords.url + '" target="_blank" rel="noopener" style="font-weight:700;font-size:13px;margin-bottom:4px;color:#60a5fa;text-decoration:none;display:block">' + (coords.label || loc.location) + '</a>'
          : '<div style="font-weight:700;font-size:13px;margin-bottom:4px;color:#e2e8f0">' + (coords.label || loc.location) + '</div>') +
        '<div style="color:#94a3b8">MTD Revenue</div>' +
        '<div style="font-weight:700;font-size:15px;color:#60a5fa;margin:2px 0">AED ' + fmt(loc.totalRevenueMTD) + '</div>' +
        varLine +
        '<div style="color:#64748b;font-size:10px;margin-top:6px;border-top:1px solid #2f3548;padding-top:4px">Double-click to drill down</div>' +
        '</div>',
        { className: 'dark-popup', closeButton: false, offset: [0, -5] }
      );

      circle.bindTooltip(
        '<div style="font-size:10px;font-weight:700;color:#1e293b;text-align:center;line-height:1.4;text-shadow:0 0 4px rgba(255,255,255,0.9)">' +
        (coords.label || loc.location) +
        '<br/><span style="color:#2563eb;font-weight:800">' + fmtK(loc.totalRevenueMTD) + '</span></div>',
        { permanent: true, direction: 'top', offset: [0, -radius - 4], className: 'rev-tooltip' }
      );

      circle.on('dblclick', () => onClinicClick(loc));
      markersRef.current.push(circle);
    });

    if (markersRef.current.length > 0) {
      const group = L.featureGroup(markersRef.current);
      map.fitBounds(group.getBounds().pad(0.15));
    }
  }, [displayLocations, onClinicClick]);

  return (
    <div style={{ ...card, background:C.sidebarBg, padding:0, marginTop:20, overflow:"hidden" }}>
      <div style={{ padding:"18px 28px 14px", borderBottom:"1px solid "+C.border }}>
        <h2 style={{ margin:0, fontSize:17, fontWeight:700, color:C.text }}>Clinic Revenue Map</h2>
        <p style={{ margin:"4px 0 0", fontSize:12, color:C.textMuted }}>Dubai locations — bubble size = MTD revenue — double-click to drill down</p>
      </div>
      <div ref={mapRef} style={{ height: isMobile ? 350 : 600, width:"100%" }} />
    </div>
  );
}

function ClinicDrillDown({ clinic, onClose }) {
  const { useEffect } = React;
  const modalMobile = window.innerWidth < 768;
  useEffect(() => { const h = (e) => { if (e.key === "Escape") onClose(); }; window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h); }, [onClose]);
  if (!clinic) return null;
  const mtdVar = clinic.mtdBudget ? (clinic.totalRevenueMTD - clinic.mtdBudget) / clinic.mtdBudget : 0;
  const ytdVar = clinic.ytdBudget ? (clinic.totalRevenueYTD - clinic.ytdBudget) / clinic.ytdBudget : 0;
  const mtdVarLY = clinic.mtdLY ? (clinic.totalRevenueMTD - clinic.mtdLY) / clinic.mtdLY : null;
  const ytdVarLY = clinic.ytdLY ? (clinic.totalRevenueYTD - clinic.ytdLY) / clinic.ytdLY : null;

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(10,15,25,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:9999, backdropFilter:"blur(4px)" }} onClick={onClose}>
      <div className="fade-in" style={{ background:C.pageBg, borderRadius: modalMobile ? 0 : 16, width: modalMobile ? "100%" : "92%", maxWidth: modalMobile ? "100%" : 960, maxHeight: modalMobile ? "100vh" : "85vh", height: modalMobile ? "100vh" : "auto", overflow:"auto", boxShadow:"0 25px 60px rgba(0,0,0,0.5)", border: modalMobile ? "none" : "1px solid "+C.border }} onClick={(e) => e.stopPropagation()}>

        {/* Header */}
        <div style={{ padding: modalMobile ? "16px" : "20px 28px", background:"linear-gradient(135deg, "+C.primaryDark+", "+C.primary+")", borderRadius: modalMobile ? 0 : "16px 16px 0 0", color:"#fff", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>

            <h2 style={{ margin:"4px 0 0", fontSize: modalMobile ? 18 : 22, fontWeight:800 }}>{(() => { const url = CLINIC_COORDS[clinic.location]?.url; return url ? <a href={url} target="_blank" rel="noopener noreferrer" style={{ color:"#fff", textDecoration:"none" }} onMouseEnter={(e) => e.target.style.textDecoration="underline"} onMouseLeave={(e) => e.target.style.textDecoration="none"}>{CLINIC_COORDS[clinic.location]?.label || clinic.location}</a> : (CLINIC_COORDS[clinic.location]?.label || clinic.location); })()}</h2>
          </div>
          <button onClick={onClose} style={{ width: modalMobile ? 40 : 36, height: modalMobile ? 40 : 36, borderRadius:10, background:"rgba(255,255,255,0.15)", border:"none", color:"#fff", fontSize: modalMobile ? 20 : 18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>{"\u2715"}</button>
        </div>

        {/* Mini KPIs */}
        <div style={{ display:"grid", gridTemplateColumns: modalMobile ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: modalMobile ? 8 : 12, padding: modalMobile ? "12px 16px" : "16px 28px" }}>
          <div style={{ background:C.cardBg, border:"1px solid "+C.border, borderRadius:10, padding:"12px 16px" }}>
            <div style={{ fontSize:10, fontWeight:600, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>Today</div>
            <div style={{ fontSize:20, fontWeight:800, color:C.primaryLight, marginTop:4 }}>AED {fmt(clinic.totalToday)}</div>
          </div>
          <div style={{ background:C.cardBg, border:"1px solid "+C.border, borderRadius:10, padding:"12px 16px" }}>
            <div style={{ fontSize:10, fontWeight:600, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>MTD Revenue</div>
            <div style={{ fontSize:20, fontWeight:800, color:C.primaryLight, marginTop:4 }}>AED {fmt(clinic.totalRevenueMTD)}</div>
            <div style={{ display:"flex", gap:4, marginTop:4, flexWrap:"wrap" }}>
              {mtdVarLY != null && <span style={{ fontSize:10, fontWeight:600, color:varColor(mtdVarLY), background:varBg(mtdVarLY), padding:"1px 6px", borderRadius:4, display:"inline-block" }}>vs LY {pct(mtdVarLY)}</span>}
              <span style={{ fontSize:10, fontWeight:600, color:varColor(mtdVar), background:varBg(mtdVar), padding:"1px 6px", borderRadius:4, display:"inline-block" }}>vs Budget {pct(mtdVar)}</span>

            <div style={{ fontSize:10, fontWeight:600, color:C.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>YTD Revenue</div>
            <div style={{ fontSize:20, fontWeight:800, color:C.primaryLight, marginTop:4 }}>AED {fmt(clinic.totalRevenueYTD)}</div>

              <tr style={{ background:"#1e293b" }}>

                <th style={{ ...dth, textAlign:"right" }}>Today</th>
                <th style={{ ...dth, textAlign:"right" }}>MTD Actual</th>
                <th style={{ ...dth, textAlign:"right" }}>MTD Budget</th>
                <th style={{ ...dth, textAlign:"right" }}>vs Budget</th>
                <th style={{ ...dth, textAlign:"right" }}>YTD Actual</th>
                <th style={{ ...dth, textAlign:"right" }}>YTD Budget</th>
              </tr>
            </thead>
            <tbody>
              {clinic.specialties.map((spec) => {
                const specVar = spec.mtdBudget ? (spec.mtdActual - spec.mtdBudget) / spec.mtdBudget : 0;
                return (
                  <React.Fragment key={spec.name}>
                    <tr style={{ background:"rgba(59,130,246,0.06)", borderBottom:"1px solid "+C.border }}>
                      <td style={{ ...dtd, fontWeight:700, color:C.primaryLight }}>{spec.name}</td>
                      <td style={dtn}>{fmt(spec.today)}</td>
                      <td style={{ ...dtn, fontWeight:700 }}>{fmt(spec.mtdActual)}</td>
                      <td style={{ ...dtn, color:C.textMuted }}>{fmt(spec.mtdBudget)}</td>

                      <td style={{ ...dtn, fontWeight:700 }}>{fmt(spec.ytdActual)}</td>
                      <td style={{ ...dtn, color:C.textMuted }}>{fmt(spec.ytdBudget)}</td>
                    </tr>
                    {spec.doctors.map((doc, di) => {
                      const docVar = doc.mtdBudget ? (doc.mtdActual - doc.mtdBudget) / doc.mtdBudget : 0;
                      return (
                        <tr key={doc.name + di} style={{ background: di % 2 ? C.cardHover : C.cardBg, borderBottom:"1px solid "+C.border }}>
                          <td style={{ ...dtd, paddingLeft:32 }}><DoctorName name={doc.name} /></td>
                          <td style={dtn}>{fmt(doc.today)}</td>
                          <td style={dtn}>{fmt(doc.mtdActual)}</td>

                          <td style={{ ...dtn, color:varColor(docVar), fontWeight:600 }}>{pct(docVar)}</td>
                          <td style={dtn}>{fmt(doc.ytdActual)}</td>
                          <td style={{ ...dtn, color:C.textMuted }}>{fmt(doc.ytdBudget)}</td>
                        </tr>
                      );
                    })}
                  </React.Fragment>
                );
              })}
              <tr style={{ background:"rgba(59,130,246,0.08)", borderTop:"2px solid " + C.primary }}>
                <td style={{ ...dtd, fontWeight:800, color:C.primaryLight }}>TOTAL</td>
                <td style={{ ...dtn, fontWeight:800, color:C.primaryLight }}>{fmt(clinic.totalToday)}</td>
                <td style={{ ...dtn, fontWeight:800, color:C.primaryLight }}>{fmt(clinic.totalRevenueMTD)}</td>
                <td style={{ ...dtn, fontWeight:700, color:C.textMuted }}>{fmt(clinic.mtdBudget)}</td>
                <td style={{ ...dtn, fontWeight:800, color:varColor(mtdVar) }}>{pct(mtdVar)}</td>
                <td style={{ ...dtn, fontWeight:800, color:C.primaryLight }}>{fmt(clinic.totalRevenueYTD)}</td>
                <td style={{ ...dtn, fontWeight:700, color:C.textMuted }}>{fmt(clinic.ytdBudget)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── Dashboard Chat ─────────────────────────────────────────────────────────

function DashboardChat({ totals, dsrTotals, specialties, locations, ipTotals, doctors, reportDate, isMobile }) {
  const [isOpen, setIsOpen] = useState(false);
  const [messages, setMessages] = useState([{ role:"assistant", content:"Hi! I can help you analyze the dashboard data. Ask me anything \u2014 for example:\n\n\u2022 What\u2019s driving the YTD decline?\n\u2022 Which clinics are underperforming?\n\u2022 How does DSU compare to other clinics?\n\u2022 What specialties need attention?" }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  const scrollToBottom = () => messagesEndRef.current?.scrollIntoView({ behavior:"smooth" });
  React.useEffect(() => { scrollToBottom(); }, [messages]);
  React.useEffect(() => { if (isOpen && inputRef.current) inputRef.current.focus(); }, [isOpen]);

  const buildContext = () => {
    const topClinics = [...locations].filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location)).sort((a,b) => b.totalRevenueMTD - a.totalRevenueMTD).slice(0,5);
    const underperforming = specialties.filter(s => s.ytdVarLY < 0).sort((a,b) => a.ytdVarLY - b.ytdVarLY);
    const topDocs = [...doctors].sort((a,b) => b.mtdActual - a.mtdActual).slice(0,10);
    const resignedDocs = doctors.filter(d => !getDoctorProfileUrl(d.name) && d.ytdLY > 0);
    const cbdDocs = doctors.filter(d => isCBD(d.name));

    return `You are analyzing an Al-Futtaim HealthHub revenue dashboard. Report date: ${reportDate}. All values in AED.

KEY METRICS:
- Today's Revenue: ${fmt(totals.todayRev)}
- MTD Revenue: ${fmt(totals.mtdActual)} (vs LY: ${fmt(totals.mtdLY)}, ${pct(totals.mtdVarLY)} change)
- YTD Revenue: ${fmt(totals.ytdActual)} (vs LY: ${fmt(totals.ytdLY)}, ${pct(totals.ytdVarLY)} change)
- YTD Budget: ${fmt(totals.ytdBudget)}
- Avg Revenue/Day: ${fmt(Math.round(totals.mtdActual / (dsrTotals.daysElapsed || 1)))} over ${dsrTotals.daysElapsed || 0} days
- OP Volume MTD: ${fmt(dsrTotals.opMtdVolume)} visits
- IP Revenue MTD: ${fmt(ipTotals.mtdActual)} (${ipTotals.volume} cases, vs LY: ${fmt(ipTotals.mtdLY)})

TOP 5 CLINICS BY MTD:
${topClinics.map(l => `- ${CLINIC_COORDS[l.location]?.label || l.location}: MTD ${fmt(l.totalRevenueMTD)} (vs LY: ${fmt(l.mtdLY || 0)}), YTD ${fmt(l.totalRevenueYTD)} (vs LY: ${fmt(l.ytdLY || 0)})`).join('\n')}

ALL SPECIALTIES (OP):
${specialties.map(s => `- ${s.name}: MTD ${fmt(s.mtdActual)} (vs LY: ${pct(s.mtdVarLY)}), YTD ${fmt(s.ytdActual)} (vs LY: ${pct(s.ytdVarLY)})`).join('\n')}

UNDERPERFORMING SPECIALTIES (YTD below LY):
${underperforming.map(s => `- ${s.name}: YTD ${fmt(s.ytdActual)} vs LY ${fmt(s.ytdLY)} (${pct(s.ytdVarLY)})`).join('\n')}

TOP 10 DOCTORS BY MTD:
${topDocs.map(d => `- ${d.name} (${d.specialty}): MTD ${fmt(d.mtdActual)}, Locations: ${d.locations || 'N/A'}`).join('\n')}

RESIGNED DOCTORS: ${resignedDocs.length} doctors with LY revenue of ${fmt(resignedDocs.reduce((a,d) => a + (d.ytdLY||0), 0))}
CBD DOCTORS: ${cbdDocs.length} doctors generating ${fmt(cbdDocs.reduce((a,d) => a + (d.mtdActual||0), 0))} MTD

ALL CLINICS:
${locations.filter(l => !EXCLUDED_MAP_LOCATIONS.has(l.location)).map(l => `- ${CLINIC_COORDS[l.location]?.label || l.location}: MTD ${fmt(l.totalRevenueMTD)} (LY: ${fmt(l.mtdLY||0)}), YTD ${fmt(l.totalRevenueYTD)} (LY: ${fmt(l.ytdLY||0)}), Vol: ${l.opVolMTD||0} (LY: ${l.opVolMTDLY||0})`).join('\n')}

Answer concisely with specific numbers. Focus on actionable insights.`;
  };

  const [apiKey, setApiKey] = useState(localStorage.getItem("hh_claude_key") || "");
  const [showKeyInput, setShowKeyInput] = useState(false);

  const saveApiKey = (key) => { localStorage.setItem("hh_claude_key", key); setApiKey(key); setShowKeyInput(false); };

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    if (!apiKey) { setShowKeyInput(true); return; }
    const userMsg = input.trim();
    setInput("");
    setMessages(prev => [...prev, { role:"user", content:userMsg }]);
    setLoading(true);

    try {
      const context = buildContext();
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1024,
          system: context,
          messages: [...messages.filter(m => m.role !== "assistant" || messages.indexOf(m) > 0).slice(-6), { role:"user", content:userMsg }],
        }),
      });

      if (!response.ok) {
        const err = await response.text();
        throw new Error(err);
      }

      const data = await response.json();
      const reply = data.content[0].text;
      setMessages(prev => [...prev, { role:"assistant", content:reply }]);
    } catch (err) {
      setMessages(prev => [...prev, { role:"assistant", content:"Sorry, I couldn't process that. Error: " + (err.message || "Unknown error").substring(0, 100) }]);
    }
    setLoading(false);
  };

  return (
    React.createElement(React.Fragment, null,
      !isOpen && React.createElement("button", {
        onClick: () => { setIsOpen(true); if (!apiKey) setShowKeyInput(true); },
        style: {
          position:"fixed", bottom: isMobile ? 16 : 24, right: isMobile ? 16 : 24, width:56, height:56,
          borderRadius:"50%", background:"linear-gradient(135deg, #3b82f6, #8b5cf6)", border:"none",
          boxShadow:"0 4px 20px rgba(59,130,246,0.4)", cursor:"pointer", zIndex:9000,
          display:"flex", alignItems:"center", justifyContent:"center", transition:"transform 0.2s",
        },
        onMouseEnter: (e) => e.target.style.transform="scale(1.1)",
        onMouseLeave: (e) => e.target.style.transform="scale(1)",
      }, React.createElement("svg", { width:24, height:24, viewBox:"0 0 24 24", fill:"#fff", stroke:"none" },
        React.createElement("path", { d:"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" })
      )),

      isOpen && React.createElement("div", {
        style: {
          position:"fixed", bottom: isMobile ? 0 : 24, right: isMobile ? 0 : 24,
          width: isMobile ? "100%" : 400, height: isMobile ? "100%" : 520,

        },
          React.createElement("input", {

            onKeyDown: (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } },
            placeholder: "Ask about the dashboard data...",

          }),
          React.createElement("button", {

              padding:"10px 16px", borderRadius:10, background: loading ? C.border : "#3b82f6", border:"none",
